<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
<title>守护规则 - 回家</title>

<link rel="icon" href="data:,"/>
<link rel="stylesheet" href="assets/styles/tailwind.css?v=20260708-local-1"/>
<link rel="stylesheet" href="assets/styles/stitch-app-adapt.css?v=20260708-product-flow-1"/>
<style>
  :root {
    --bg: #f6f7f3;
    --panel: #fffefc;
    --soft: #eef2eb;
    --line: rgba(70, 82, 70, 0.13);
    --text: #202520;
    --muted: #687168;
    --primary: #536d5a;
    --primary-strong: #1f2a22;
    --primary-soft: #e8efe8;
    --good: #2d7d5c;
    --warn: #b66e3f;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-top-reserved: max(var(--safe-top), 38px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100dvh;
    background:
      radial-gradient(circle at 18% 0%, rgba(255, 255, 255, 0.96) 0%, rgba(255, 255, 255, 0) 38%),
      linear-gradient(180deg, #f8f9f4 0%, var(--bg) 48%, #eef1ea 100%);
    color: var(--text);
    font-family: "Noto Sans SC Local", "PingFang SC", "Hiragino Sans GB", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    -webkit-font-smoothing: antialiased;
    padding-bottom: calc(92px + var(--safe-bottom));
  }
  .material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 430, "GRAD" 0, "opsz" 24; }
  .page {
    width: min(100%, 430px);
    margin: 0 auto;
    padding: calc(18px + var(--safe-top-reserved)) 20px 24px;
  }
  .topbar {
    display: grid;
    grid-template-columns: 42px minmax(0, 1fr) 42px;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .icon-button {
    width: 42px;
    height: 42px;
    border-radius: 999px;
    border: 1px solid rgba(255, 255, 255, 0.72);
    background: rgba(255, 255, 255, 0.68);
    color: var(--text);
    box-shadow: 0 8px 20px rgba(60, 73, 58, 0.06);
    backdrop-filter: blur(14px);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
  }
  .title {
    text-align: center;
    min-width: 0;
  }
  .title h1 {
    margin: 0;
    font-size: 21px;
    line-height: 1.15;
  }
  .title p {
    margin: 5px 0 0;
    color: var(--muted);
    font-size: 12px;
    font-weight: 700;
  }
  .status-card,
  .rule-group {
    border: 1px solid var(--line);
    border-radius: 24px;
    background: var(--panel);
    box-shadow: 0 14px 34px rgba(54, 67, 53, 0.06);
  }
  .status-card {
    padding: 16px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .status-icon {
    width: 44px;
    height: 44px;
    border-radius: 18px;
    background: var(--primary-soft);
    color: var(--primary);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex: 0 0 auto;
  }
  .status-card h2 {
    margin: 0;
    font-size: 19px;
  }
  .status-card p {
    margin: 6px 0 0;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.55;
  }
  .app-section-badge,
  .small-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 26px;
    border-radius: 999px;
    padding: 5px 10px;
    background: rgba(83, 109, 90, 0.1);
    color: var(--primary);
    font-size: 11px;
    font-weight: 800;
    white-space: nowrap;
  }
  .section-title {
    margin: 22px 0 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .section-title h3 {
    margin: 0;
    font-size: 18px;
  }
  .section-title p {
    margin: 4px 0 0;
    color: var(--muted);
    font-size: 12px;
  }
  .rule-group {
    overflow: hidden;
  }
  .rule-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 14px;
    align-items: center;
    padding: 15px 16px;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
    user-select: none;
  }
  .rule-row:last-child { border-bottom: 0; }
  .rule-row h4 {
    margin: 0;
    font-size: 15px;
    font-weight: 800;
  }
  .rule-heading {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
  }
  .rule-heading h4 {
    min-width: 0;
  }
  .rule-state-badge {
    display: inline-flex;
    align-items: center;
    min-height: 22px;
    border-radius: 999px;
    padding: 4px 8px;
    background: rgba(45, 125, 92, 0.1);
    color: var(--good);
    font-size: 10px;
    font-weight: 900;
    white-space: nowrap;
  }
  .rule-row[data-capability="unsupported"] {
    cursor: not-allowed;
    background: rgba(239, 242, 235, 0.42);
  }
  .rule-row[data-capability="unsupported"] h4,
  .rule-row[data-capability="unsupported"] p {
    color: #8b938a;
  }
  .rule-row[data-capability="unsupported"] .rule-state-badge {
    background: rgba(104, 113, 104, 0.1);
    color: #687168;
  }
  .rule-row p {
    margin: 5px 0 0;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.45;
  }
  .switch {
    appearance: none !important;
    -webkit-appearance: none !important;
    position: relative;
    width: 52px !important;
    height: 30px !important;
    min-width: 52px !important;
    border: 0 !important;
    border-radius: 999px !important;
    background: #d8ddd4 !important;
    box-shadow: inset 0 1px 2px rgba(57, 49, 58, 0.08);
    transition: background-color 180ms ease, box-shadow 180ms ease;
    cursor: pointer;
    flex: 0 0 auto;
  }
  .switch::before {
    content: "";
    position: absolute;
    top: 3px;
    left: 3px;
    width: 24px;
    height: 24px;
    border-radius: 999px;
    background: #ffffff;
    border: 1px solid rgba(196, 193, 201, 0.92);
    box-shadow: 0 3px 10px rgba(57, 49, 58, 0.14);
    transition: transform 180ms ease, border-color 180ms ease;
  }
  .switch:checked {
    background: var(--primary) !important;
    box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.18), 0 8px 18px rgba(54, 67, 53, 0.16);
  }
  .switch:checked::before {
    transform: translateX(22px);
    border-color: rgba(255, 255, 255, 0.92);
  }
  .switch:focus-visible {
    outline: 0;
    box-shadow: 0 0 0 4px rgba(83, 109, 90, 0.16);
  }
  .switch:disabled {
    opacity: 0.48;
    cursor: not-allowed;
  }
  .number-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
  }
  .field {
    display: block;
    border: 1px solid var(--line);
    border-radius: 16px;
    background: #fbfcf8;
    padding: 12px;
  }
  .field span {
    display: block;
    color: var(--muted);
    font-size: 12px;
    font-weight: 800;
    margin-bottom: 8px;
  }
  .field input {
    width: 100%;
    border: 0;
    padding: 0;
    background: transparent;
    color: var(--text);
    font-size: 20px;
    font-weight: 800;
  }
  .save-button {
    width: 100%;
    min-height: 50px;
    margin-top: 18px;
    border: 0;
    border-radius: 999px;
    background: var(--primary-strong);
    color: #ffffff;
    font-size: 15px;
    font-weight: 900;
  }
  .bottom-nav {
    position: fixed;
    left: 50%;
    bottom: 0;
    z-index: 50;
    width: min(100%, 430px);
    transform: translateX(-50%);
    display: flex;
    justify-content: space-around;
    padding: 10px 10px calc(10px + var(--safe-bottom));
    background: linear-gradient(180deg, rgba(246, 247, 243, 0), rgba(246, 247, 243, 0.92) 24%, rgba(246, 247, 243, 0.98));
    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px);
    box-shadow: none;
  }
  .bottom-nav a {
    min-width: 58px;
    min-height: 52px;
    border-radius: 999px;
    color: var(--muted);
    text-decoration: none;
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 800;
    gap: 3px;
  }
  .bottom-nav a.active {
    background: var(--primary-soft);
    color: var(--primary-strong);
  }
  @media (max-width: 380px) {
    .number-grid { grid-template-columns: minmax(0, 1fr); }
  }
</style>
</head>
<body>
<main class="page">
  <header class="topbar">
    <a class="icon-button" href="privacy.html?app=1" aria-label="返回我的">
      <span class="material-symbols-outlined">arrow_back</span>
    </a>
    <div class="title">
      <h1>守护规则</h1>
      <p>我的 · 设备规则</p>
    </div>
    <span id="rulesSaveState" class="small-badge">同步中</span>
  </header>

  <section class="status-card">
    <span class="status-icon">
      <span class="material-symbols-outlined">tune</span>
    </span>
    <div class="min-w-0">
      <div class="flex items-start justify-between gap-2">
        <h2 id="rulesStatusTitle">正在读取规则</h2>
        <span id="detectorBadge" class="small-badge">检测中</span>
      </div>
      <p id="rulesStatusText">规则保存后会同步到家庭盒子，并在下一轮检测时生效。</p>
    </div>
  </section>

  <div class="section-title">
    <div>
      <h3>检测频率</h3>
      <p>这些阈值会影响盒子多久抽帧、多久生成提醒。</p>
    </div>
  </div>
  <section class="number-grid">
    <label class="field">
      <span>抽帧间隔 秒</span>
      <input id="captureInterval" data-rule-input type="number" min="1" max="3600" value="5">
    </label>
    <label class="field">
      <span>静止阈值 秒</span>
      <input id="noMotionSeconds" data-rule-input type="number" min="10" max="86400" value="900">
    </label>
    <label class="field">
      <span>无人阈值 秒</span>
      <input id="noPersonSeconds" data-rule-input type="number" min="10" max="86400" value="900">
    </label>
  </section>

  <div class="section-title">
    <div>
      <h3>基础提醒</h3>
      <p>不依赖大模型，来自摄像头状态和本机规则。</p>
    </div>
  </div>
  <section class="rule-group">
    <label class="rule-row">
      <span>
        <h4>摄像头离线提醒</h4>
        <p>摄像头无法连接或盒子长时间拿不到画面时提醒。</p>
      </span>
      <input id="offlineEnabled" data-rule-input class="switch" type="checkbox">
    </label>
    <label class="rule-row">
      <span>
        <h4>黑屏或遮挡提醒</h4>
        <p>画面亮度和对比度异常时提醒，适合发现遮挡、强背光或设备异常。</p>
      </span>
      <input id="blackEnabled" data-rule-input class="switch" type="checkbox">
    </label>
    <label class="rule-row">
      <span>
        <h4>长时间静止提醒</h4>
        <p>画面持续低变化超过阈值时生成候选提醒。</p>
      </span>
      <input id="noMotionEnabled" data-rule-input class="switch" type="checkbox">
    </label>
  </section>

  <div class="section-title">
    <div>
      <h3>盒子视觉算法</h3>
      <p id="personHint">正在读取家庭盒子的视觉能力。</p>
    </div>
  </div>
  <section class="rule-group">
    <label class="rule-row">
      <span>
        <span class="rule-heading">
          <h4>人形检测能力</h4>
          <span id="personCapabilityBadge" class="rule-state-badge">读取中</span>
        </span>
        <p>开启后盒子会在人形检测可用时记录人数和人体框。</p>
      </span>
      <input id="personDetectionEnabled" data-rule-input class="switch" type="checkbox">
    </label>
    <label class="rule-row">
      <span>
        <span class="rule-heading">
          <h4>长时间无人提醒</h4>
          <span id="noPersonCapabilityBadge" class="rule-state-badge">读取中</span>
        </span>
        <p>连续未检测到人形超过阈值时提醒。此项依赖人形检测。</p>
      </span>
      <input id="noPersonMirror" data-rule-input class="switch" type="checkbox">
    </label>
    <label class="rule-row">
      <span>
        <span class="rule-heading">
          <h4>疑似跌倒候选提醒</h4>
          <span id="fallCapabilityBadge" class="rule-state-badge">读取中</span>
        </span>
        <p id="fallHint">需要家庭盒子的视觉模型可用。</p>
      </span>
      <input id="fallDetectionEnabled" data-rule-input class="switch" type="checkbox">
    </label>
    <label class="rule-row">
      <span>
        <span class="rule-heading">
          <h4>活动状态候选提醒</h4>
          <span id="activityCapabilityBadge" class="rule-state-badge">读取中</span>
        </span>
        <p id="activityHint">用于久坐、长时间低活动等候选状态。</p>
      </span>
      <input id="activityDetectionEnabled" data-rule-input class="switch" type="checkbox">
    </label>
    <label class="rule-row">
      <span>
        <span class="rule-heading">
          <h4>明火或烟火候选提醒</h4>
          <span id="fireCapabilityBadge" class="rule-state-badge">读取中</span>
        </span>
        <p id="fireHint">本地连续帧命中后生成候选提醒。</p>
      </span>
      <input id="fireDetectionEnabled" data-rule-input class="switch" type="checkbox">
    </label>
  </section>

  <div class="section-title">
    <div>
      <h3>通知</h3>
      <p>开启后有提醒会进入家属端消息，并按手机通知设置送达。</p>
    </div>
  </div>
  <section class="rule-group">
    <label class="rule-row">
      <span>
        <h4>生成提醒通知</h4>
        <p>关闭后仍会记录事件，但不主动推送给家属端。</p>
      </span>
      <input id="notificationEnabled" data-rule-input class="switch" type="checkbox">
    </label>
  </section>

  <button id="saveRulesButton" class="save-button" type="button">保存规则</button>
</main>

<nav class="bottom-nav" aria-label="底部导航">
  <a href="index.html?app=1"><span class="material-symbols-outlined">home</span>首页</a>
  <a href="monitor.html?app=1"><span class="material-symbols-outlined">security</span>守护</a>
  <a href="events.html?app=1"><span class="material-symbols-outlined">history</span>事件</a>
  <a href="companionship.html?app=1"><span class="material-symbols-outlined">volunteer_activism</span>陪伴</a>
  <a class="active" href="privacy.html?app=1"><span class="material-symbols-outlined">person</span>我的</a>
</nav>

<script src="assets/scripts/edge-client.js?v=20260709-cloud-stream-1"></script>
<script src="assets/scripts/rules-live.js?v=20260710-default-rules-2"></script>
<script src="assets/scripts/stitch-app-data.js?v=20260709-family-flow-1"></script>
<script src="assets/scripts/stitch-app-routes.js?v=20260708-product-flow-1"></script>
</body>
</html>
