<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>App 壳 - 回家</title>

<link rel="icon" href="data:,"/>
<link rel="manifest" href="app.webmanifest">
    <link href="assets/styles/tailwind.css" rel="stylesheet">
    <link href="assets/styles/material-symbols.css" rel="stylesheet">
    <link href="assets/styles/app.css?v=20260708-cachefix-1" rel="stylesheet">
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
        .material-symbols-outlined.fill { font-variation-settings: 'FILL' 1; }
        html, body, .font-display, .font-sans { font-family: var(--app-font-family); }
        body { -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 0; background: transparent; }
    </style>
</head>
<body class="app-phone-shell text-on-surface font-sans antialiased">
    <header class="app-topbar">
        <span class="app-topbar-side placeholder"></span>
        <p class="app-topbar-title">回家</p>
        <span class="app-topbar-side placeholder"></span>
    </header>

    <main class="app-main app-stack">
        <section class="app-home-hero p-6 flex flex-col gap-4">
            <div class="flex items-center justify-between gap-3">
                <p id="appShellStatusBadge" class="app-section-badge w-max">加载中</p>
                <div class="w-11 h-11 rounded-full overflow-hidden border border-white/70 shadow-[0_14px_28px_rgba(79,70,91,0.1)] shrink-0">
                    <img src="assets/images/avatar.jpg" alt="回家" class="w-full h-full object-cover">
                </div>
            </div>
            <div class="flex flex-col gap-2">
                <p id="appShellTitle" class="font-display text-[28px] font-bold text-on-surface tracking-[-0.02em] leading-[1.18]">回家</p>
                <p id="appShellSubtitle" class="font-sans text-[13px] text-on-surface-variant leading-[1.8] max-w-[260px]">先把登录、家庭和设备轻轻接住，再把你送到家里此刻。</p>
            </div>
            <div class="app-panel-muted px-5 py-5">
                <p id="appShellHeadline" class="font-display text-[20px] font-bold text-on-surface tracking-[-0.02em]">正在接住登录态</p>
                <p id="appShellMeta" class="font-sans text-[12px] text-on-surface-variant mt-2 leading-[1.8]">稍等片刻</p>
            </div>
            <div class="app-kpi-grid">
                <div class="app-kpi">
                    <p>账号</p>
                    <p id="appShellAccountValue">-</p>
                </div>
                <div class="app-kpi">
                    <p>家庭</p>
                    <p id="appShellFamilyValue">-</p>
                </div>
                <div class="app-kpi">
                    <p>设备</p>
                    <p id="appShellDeviceValue">-</p>
                </div>
                <div class="app-kpi">
                    <p>摄像头</p>
                    <p id="appShellCameraValue">-</p>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <a id="appShellPrimaryAction" href="login.html?next=app-shell.html&app=1" class="app-btn-primary font-sans text-[13px] font-bold flex items-center justify-center">
                    <span id="appShellPrimaryText">登录进入</span>
                </a>
                <a id="appShellSecondaryAction" href="family.html?app=1" class="app-btn-secondary font-sans text-[13px] font-bold flex items-center justify-center">家庭空间</a>
            </div>
        </section>

        <section class="app-panel p-5 flex flex-col gap-4">
            <div class="flex items-center justify-between gap-3">
                <h2 class="font-display text-[18px] font-bold text-on-surface">现在去看</h2>
                <span class="app-section-badge shrink-0">演示链</span>
            </div>
            <div class="grid grid-cols-3 gap-3">
                <a id="appShellHomeLink" href="index.html?app=1" class="app-panel-muted px-3 py-4 text-center">
                    <p class="font-display text-[15px] font-bold text-on-surface">首页</p>
                    <p class="font-sans text-[11px] text-on-surface-variant mt-1">先讲价值</p>
                </a>
                <a id="appShellWatchLink" href="watch.html?app=1" class="app-panel-muted px-3 py-4 text-center">
                    <p class="font-display text-[15px] font-bold text-on-surface">实时</p>
                    <p class="font-sans text-[11px] text-on-surface-variant mt-1">直接看画面</p>
                </a>
                <a id="appShellEventsLink" href="events.html?app=1" class="app-panel-muted px-3 py-4 text-center">
                    <p class="font-display text-[15px] font-bold text-on-surface">事件</p>
                    <p class="font-sans text-[11px] text-on-surface-variant mt-1">看证据链</p>
                </a>
            </div>
        </section>

        <section class="app-stack">
            <div class="flex items-center justify-between">
                <h2 class="font-display text-[18px] font-bold text-on-surface">下一步入口</h2>
                <span class="app-section-badge shrink-0">最短路径</span>
            </div>
            <div id="appShellActionList" class="flex flex-col gap-3"></div>
        </section>

        <section class="app-panel px-5 py-5 flex items-center justify-between gap-4">
            <div class="min-w-0">
                <p class="font-sans text-[11px] font-semibold text-on-surface-variant">App 配置</p>
                <p id="appShellBundleId" class="font-display text-[13px] font-bold text-on-surface mt-1 break-all">-</p>
                <p id="appShellScheme" class="font-sans text-[12px] text-on-surface-variant mt-1">-</p>
            </div>
            <a id="appShellPrivacyLink" href="privacy.html?app=1" class="shrink-0 app-btn-secondary h-10 px-4 text-[12px] font-semibold flex items-center justify-center">隐私</a>
        </section>
    </main>
    <script src="assets/scripts/edge-client.js?v=20260709-frame-fallback-1"></script>
    <script src="assets/scripts/app-shell-live.js?v=20260630-flow3"></script>
</body>
</html>
