<script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputField = document.getElementById('custom-name');
            const clearBtn = document.getElementById('clear-input');
            const nextBtn = document.getElementById('next-button');
            const cards = document.querySelectorAll('.relationship-card');

            // Handle Input changes
            inputField.addEventListener('input', (e) => {
                const val = e.target.value.trim();

                // Toggle clear button
                if (val.length > 0) {
                    clearBtn.classList.remove('hidden');
                    nextBtn.disabled = false;
                } else {
                    clearBtn.classList.add('hidden');
                    nextBtn.disabled = true;
                }

                // Deselect cards if typing custom
                cards.forEach(card => card.classList.remove('selected', 'border-primary', 'bg-primary-container', 'text-on-primary-container'));

                // Auto-select if typing matches exactly
                cards.forEach(card => {
                    if (card.dataset.name === val) {
                        card.classList.add('selected', 'border-primary', 'bg-primary-container', 'text-on-primary-container');
                        card.classList.remove('border-surface-container-highest', 'bg-surface-container-lowest');
                    }
                });
            });

            // Handle Clear button
            clearBtn.addEventListener('click', () => {
                inputField.value = '';
                inputField.focus();
                clearBtn.classList.add('hidden');
                nextBtn.disabled = true;
                cards.forEach(card => {
                    card.classList.remove('selected', 'border-primary', 'bg-primary-container', 'text-on-primary-container');
                    card.classList.add('border-surface-container-highest', 'bg-surface-container-lowest');
                });
            });

            // Handle Card clicks
            cards.forEach(card => {
                card.addEventListener('click', () => {
                    const name = card.dataset.name;

                    // Reset all
                    cards.forEach(c => {
                        c.classList.remove('selected', 'border-primary', 'bg-primary-container', 'text-on-primary-container');
                        c.classList.add('border-surface-container-highest', 'bg-surface-container-lowest');
                    });

                    // Select current
                    card.classList.add('selected', 'border-primary', 'bg-primary-container', 'text-on-primary-container');
                    card.classList.remove('border-surface-container-highest', 'bg-surface-container-lowest');

                    // Update input
                    inputField.value = name;
                    clearBtn.classList.remove('hidden');
                    nextBtn.disabled = false;

                    // Small haptic feedback simulation
                    if (window.navigator && window.navigator.vibrate) {
                        window.navigator.vibrate(50);
                    }
                });
            });
        });
    </script>

<script id="gohome-stitch-route-links">
  (() => {
    const routes = {
      "首页": "index.html",
      "守护": "monitor.html",
      "消息": "events.html",
      "陪伴": "companionship.html",
      "我的": "privacy.html",
      "实时画面": "watch.html",
      "事件列表": "events.html",
      "规则设置": "rules.html",
      "家庭成员": "family_members.html",
      "通知设置": "notifications.html",
      "隐私与数据": "privacy_data.html",
      "添加摄像头": "connect.html",
      "设备管理": "cameras.html"
    };
    document.addEventListener("click", (event) => {
      const item = event.target.closest("a, button");
      if (!item) return;
      if (item.hasAttribute("onclick")) return;
      const href = item.getAttribute("href");
      if (href && href !== "#") return;
      const text = (item.innerText || item.textContent || "").replace(/\s+/g, "").trim();
      const route = routes[text];
      if (!route) return;
      event.preventDefault();
      window.location.href = route;
    });
  })();
</script>
