<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
<title>回家 - 登录</title>

<link rel="icon" href="data:,"/>
<link rel="stylesheet" href="assets/styles/tailwind.css?v=20260708-local-1"/>
<style>
        body {
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .icon-fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom input styles */
        .glass-input:focus-within {
            box-shadow: inset 0 0 0 2px #536d5a;
            background-color: #ffffff;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<style id="gohome-app-minimal-adapt">
  :root {
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-right: env(safe-area-inset-right, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-left: env(safe-area-inset-left, 0px);
  }
  html, body {
    min-height: 100dvh;
    background: #fbf9f8;
  }
  body {
    padding-left: var(--safe-left);
    padding-right: var(--safe-right);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  nav.fixed.bottom-0,
  nav.docked.bottom-0,
  nav.pb-safe-area-bottom {
    padding-bottom: calc(10px + var(--safe-bottom)) !important;
  }
  @media (display-mode: standalone) {
    body {
      padding-top: var(--safe-top);
    }
  }
</style>
<link rel="stylesheet" href="assets/styles/stitch-app-adapt.css?v=20260708-cachefix-1"/>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar (Transactional - Hidden Navigation Elements) -->
<header class="flex justify-between items-center w-full px-margin-page py-4 bg-surface z-40">
<!-- Back action implies temporary departure from main flow if this was a sub-page,
             but for a top-level transactional page like Login, we might just have a close or empty left. -->
<button aria-label="Close" class="w-10 h-10 flex items-center justify-center rounded-full text-on-surface-variant hover:bg-surface-container-low transition-colors" onclick="location.href='index.html?app=1'" type="button">
<span class="material-symbols-outlined">close</span>
</button>
<div class="font-headline-md text-headline-md font-bold text-primary opacity-0">
            回家
        </div>
<div class="w-10 h-10"></div> <!-- Spacer -->
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col px-margin-page pt-stack-lg pb-stack-lg max-w-md mx-auto w-full relative">
<!-- Ambient Background Image (Soft, evocative) -->
<div class="absolute inset-0 -z-10 overflow-hidden pointer-events-none opacity-[0.03]">
<img class="w-full h-full object-cover" data-alt="A highly detailed, soft-focus lifestyle image depicting a warm, sunlit living room with comfortable seating and indoor plants. The lighting is high-key and serene, casting gentle shadows. The color palette consists of warm whites, soft creams, and subtle earthy tones, creating a calming, safe, and domestic atmosphere suitable for a background texture in a dignified companionship app." src="assets/stitch-images/21-17bb061017.jpg"/>
</div>
<!-- Branding / Hero -->
<div class="mb-12">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-background mb-stack-sm">
                欢迎回到「回家」
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant">
                登录已有家庭，或创建新的守护家庭。
            </p>
</div>
<!-- Login Form -->
<form class="flex flex-col gap-stack-md w-full" onsubmit="event.preventDefault();">
<div aria-label="手机号登录模式" class="grid grid-cols-2 gap-1 rounded-full bg-surface-container-low p-1" role="tablist">
<button aria-pressed="true" class="gohome-auth-mode-tab rounded-full px-4 py-2.5 text-sm font-semibold bg-surface-container-lowest text-on-background shadow-sm" data-auth-mode="login" type="button">手机号登录</button>
<button aria-pressed="false" class="gohome-auth-mode-tab rounded-full px-4 py-2.5 text-sm font-semibold text-on-surface-variant" data-auth-mode="register" type="button">首次创建</button>
</div>
<p class="font-body-md text-[13px] leading-relaxed text-on-surface-variant" id="auth-mode-hint">
                用手机号登录，家庭与设备数据只跟随当前手机号显示。
            </p>
<!-- Phone Input Group -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant sr-only" for="phone">手机号码</label>
<div class="glass-input flex items-center bg-surface-container-low rounded-xl px-4 py-3 transition-all duration-200">
<span class="font-body-md text-body-md text-on-surface-variant mr-3 border-r border-outline-variant pr-3">+86</span>
<input class="bg-transparent border-none p-0 w-full font-body-md text-body-md text-on-background focus:ring-0 placeholder:text-outline" id="phone" pattern="[0-9]{11}" placeholder="请输入手机号码" required="" type="tel"/>
</div>
</div>
<!-- Verification Code Input Group -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant sr-only" for="code">验证码</label>
<div class="glass-input flex items-center bg-surface-container-low rounded-xl px-4 py-3 transition-all duration-200">
<input class="bg-transparent border-none p-0 w-full font-body-md text-body-md text-on-background focus:ring-0 placeholder:text-outline" id="code" placeholder="请输入验证码" required="" type="text"/>
<button class="whitespace-nowrap font-label-md text-label-md text-primary ml-3 pl-3 border-l border-outline-variant hover:text-primary-fixed-dim transition-colors" type="button">
                        获取验证码
                    </button>
</div>
</div>
<!-- Login Button -->
<button class="mt-stack-sm w-full bg-primary text-on-primary font-label-md text-label-md py-4 rounded-full shadow-[0_4px_12px_rgba(54,67,53,0.14)] hover:bg-on-primary-fixed-variant active:scale-[0.98] transition-all duration-200 flex justify-center items-center" id="auth-submit" type="submit">
                登录
            </button>
<!-- User Agreement -->
<div class="mt-stack-sm flex items-start gap-2">
<div class="pt-0.5">
<input class="w-4 h-4 rounded-sm border-outline text-primary focus:ring-primary focus:ring-offset-0 bg-surface-container-lowest" id="agreement" required="" type="checkbox"/>
</div>
<label class="font-body-md text-[13px] leading-relaxed text-on-surface-variant select-none" for="agreement">
                    我已阅读并同意
                    <a class="text-primary hover:underline" href="#">《用户服务协议》</a>、
                    <a class="text-primary hover:underline" href="#">《隐私政策》</a>
</label>
</div>
</form>
<div class="flex-grow"></div>
</main>
<!-- Bottom Navigation IS SUPPRESSED as per instructions for Transactional/Login screens -->

<script src="assets/scripts/edge-client.js?v=20260713-perf-2"></script>
<script src="assets/scripts/stitch-app-data.js?v=20260713-appstore-1"></script>
<script src="assets/scripts/stitch-app-routes.js?v=20260708-cachefix-1"></script>
</body></html>
