<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>绑定设备 - 回家</title>
    <link href="assets/styles/tailwind.css" rel="stylesheet">
    <link href="assets/styles/material-symbols.css" rel="stylesheet">
    <link href="assets/styles/app.css?v=20260630-style16" rel="stylesheet">
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
        .material-symbols-outlined.fill { font-variation-settings: 'FILL' 1; }
        html, body, .font-display, .font-sans { font-family: var(--app-font-family); }
        body { -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 0; background: transparent; }
        select, input { outline: none; }
    </style>
</head>
<body class="app-phone-shell text-on-surface font-sans antialiased">
    <header class="app-topbar">
        <a id="bindingBackLink" href="family.html?app=1" class="app-topbar-side">
            <span class="material-symbols-outlined">arrow_back</span>
        </a>
        <p class="app-topbar-title">把设备接进来</p>
        <span class="app-topbar-side placeholder"></span>
    </header>

    <main class="app-main app-stack">
        <section class="app-home-hero p-6 flex flex-col gap-4">
            <div>
                <p class="font-display text-[22px] font-bold text-on-surface tracking-[-0.02em]">当前设备</p>
                <p id="bindingDeviceText" class="font-sans text-[12px] text-on-surface-variant mt-1.5 leading-[1.8]">加载中</p>
            </div>
            <div class="app-kpi-grid">
                <div class="app-kpi">
                    <p>设备名</p>
                    <p id="bindingDeviceName">-</p>
                </div>
                <div class="app-kpi">
                    <p>状态</p>
                    <p id="bindingStateText">-</p>
                </div>
            </div>
        </section>

        <section id="bindingFormSection" class="app-panel px-5 py-5 flex flex-col gap-4">
            <div>
                <p class="font-display text-[18px] font-bold text-on-surface">让这台设备属于一个家</p>
                <p class="font-sans text-[12px] text-on-surface-variant mt-1 leading-[1.8]">绑定成功后会直接进入摄像头接入。</p>
            </div>
            <form id="bindingForm" class="flex flex-col gap-3">
                <label class="flex flex-col gap-1.5">
                    <span class="font-sans text-[11px] font-bold text-on-surface-variant ml-1">选择家庭</span>
                    <select id="bindingFamilySelect" class="app-form-field"></select>
                </label>
                <label class="flex flex-col gap-1.5">
                    <span class="font-sans text-[11px] font-bold text-on-surface-variant ml-1">备注</span>
                    <input id="bindingNoteInput" class="app-form-field" autocomplete="off" placeholder="比如：家里主设备">
                </label>
                <button id="bindingSubmitBtn" type="submit" class="app-btn-primary h-11 font-sans text-[13px] font-bold">绑定当前设备</button>
            </form>
            <p id="bindingFeedback" class="min-h-[20px] font-sans text-[12px] leading-5 text-on-surface-variant"></p>
        </section>

        <section id="bindingTokenSection" class="app-panel px-5 py-5 flex flex-col gap-4">
            <div class="flex items-center justify-between gap-3">
                <p class="font-display text-[18px] font-bold text-on-surface">设备身份</p>
                <span id="bindingTokenBadge" class="app-section-badge shrink-0">未激活</span>
            </div>
            <div class="app-kpi-grid">
                <div class="app-kpi">
                    <p>绑定码</p>
                    <p id="bindingCodeText">-</p>
                </div>
                <div class="app-kpi">
                    <p>心跳</p>
                    <p id="bindingHeartbeatText">-</p>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <button id="bindingCodeBtn" type="button" class="app-btn-secondary h-11 text-on-surface font-sans text-[13px] font-semibold">生成绑定码</button>
                <button id="bindingActivateBtn" type="button" class="app-btn-primary h-11 font-sans text-[13px] font-bold">激活当前设备</button>
            </div>
            <button id="bindingHeartbeatBtn" type="button" class="app-btn-secondary h-11 text-on-surface font-sans text-[13px] font-semibold">发送一次心跳</button>
            <p id="bindingTokenFeedback" class="min-h-[20px] font-sans text-[12px] leading-5 text-on-surface-variant"></p>
        </section>

        <section id="bindingEmptySection" class="hidden app-panel px-5 py-5 flex flex-col gap-3">
            <p class="font-display text-[16px] font-bold text-on-surface">还没有家庭</p>
            <a id="bindingEmptyFamilyLink" href="family.html?app=1" class="app-btn-primary h-11 text-white font-sans text-[13px] font-bold flex items-center justify-center">先创建家庭</a>
        </section>

        <section class="app-stack">
            <div class="flex items-center justify-between">
                <h2 class="font-display text-[18px] font-bold text-on-surface">已经接住的设备</h2>
                <span id="bindingListBadge" class="app-section-badge shrink-0">0 台</span>
            </div>
            <div id="bindingList" class="flex flex-col gap-3"></div>
        </section>
    </main>

    <nav class="app-bottom-nav">
        <div class="app-bottom-nav-inner">
            <div class="flex justify-between items-center">
                <a href="index.html?app=1" class="flex flex-col items-center gap-1.5 text-outline hover:text-primary transition-colors group">
                    <div class="app-nav-pill"><span class="material-symbols-outlined text-[22px]">home</span></div>
                    <span class="font-sans text-[11px] font-semibold tracking-wide">首页</span>
                </a>
                <a id="bindingNavFamilyLink" href="family.html?app=1" class="flex flex-col items-center gap-1.5 text-outline hover:text-primary transition-colors group">
                    <div class="app-nav-pill"><span class="material-symbols-outlined text-[22px]">groups</span></div>
                    <span class="font-sans text-[11px] font-semibold tracking-wide">家庭</span>
                </a>
                <a id="bindingNavSelfLink" href="device_binding.html?app=1" class="flex flex-col items-center gap-1.5 text-primary">
                    <div class="app-nav-pill active"><span class="material-symbols-outlined fill text-[22px]">devices</span></div>
                    <span class="font-sans text-[11px] font-bold tracking-wide">设备</span>
                </a>
            </div>
        </div>
    </nav>
    <script src="assets/scripts/edge-client.js?v=20260630-video1"></script>
    <script src="assets/scripts/device-binding-live.js?v=20260630-flow1"></script>
</body>
</html>
