<body class="bg-background text-on-background antialiased h-screen flex flex-col pt-safe-top pb-safe-bottom">
<!-- Header (Nav suppressed as this is a linear task) -->
<header class="flex items-center px-margin-page py-4">
<button aria-label="Back" class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-low hover:bg-surface-container-high transition-colors" onclick="history.length > 1 ? history.back() : location.href='family.html?app=1'" type="button">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
</header>
<!-- Main Content -->
<main class="flex-1 overflow-y-auto px-margin-page pb-stack-lg flex flex-col">
<div class="mb-stack-lg mt-stack-md text-center">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-background mb-stack-sm">
                连接家庭盒子
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-sm mx-auto">
                盒子完成本地 Wi-Fi 配网后，在这里关联到当前家庭。
            </p>
</div>
<!-- Device Image Area -->
<div class="relative w-full aspect-square max-w-xs mx-auto mb-stack-lg bg-surface-container-low rounded-3xl overflow-hidden shadow-[0_4px_12px_rgba(0,0,0,0.02)] flex items-center justify-center">
<img class="object-cover w-full h-full" data-alt="A high-quality, softly lit lifestyle photograph of a sleek, modern, white, rounded smart health monitoring device resting on a clean, warm wooden bedside table. The aesthetic is warm, domestic, and corporate modern, utilizing a soft cream and warm white color palette with gentle, diffused natural lighting. Minimalist style, reassuring mood." src="assets/stitch-images/18-c88194a6a8.jpg"/>
<div class="absolute inset-0 bg-gradient-to-t from-black/5 to-transparent"></div>
</div>
<section id="bindingEmptySection" class="hidden max-w-2xl mx-auto w-full">
<div class="app-soft-card bg-white p-5 text-center">
<p class="font-display text-[17px] font-bold text-on-surface">先创建家庭</p>
<p class="mt-2 font-sans text-[13px] leading-6 text-on-surface-variant">盒子需要绑定到某一个家庭，再继续配置摄像头。</p>
<a id="bindingEmptyFamilyLink" href="family.html?app=1" class="mt-4 inline-flex h-11 items-center justify-center rounded-full bg-primary px-5 font-label-md text-label-md text-on-primary">去创建家庭</a>
</div>
</section>
<section id="bindingFormSection" class="max-w-2xl mx-auto w-full">
<form id="bindingForm" class="app-soft-card bg-white p-5 space-y-4">
<div>
<label class="font-label-md text-label-md text-on-surface" for="bindingFamilySelect">绑定到</label>
<select id="bindingFamilySelect" class="mt-2 w-full rounded-2xl border border-outline-variant bg-surface-container-low px-4 py-3 font-body-md text-body-md text-on-surface outline-none focus:border-primary">
</select>
</div>
<div>
<label class="font-label-md text-label-md text-on-surface" for="bindingNoteInput">备注</label>
<input id="bindingNoteInput" class="mt-2 w-full rounded-2xl border border-outline-variant bg-surface-container-low px-4 py-3 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant outline-none focus:border-primary" placeholder="例如 妈妈家的盒子" type="text"/>
</div>
<div class="rounded-2xl bg-surface-container-low px-4 py-4">
<div class="flex items-start gap-3">
<span class="material-symbols-outlined mt-0.5 text-primary">wifi_find</span>
<div>
<p class="font-sans text-[13px] font-bold text-on-surface">让手机和盒子连接同一个 Wi-Fi</p>
<p class="mt-1 font-sans text-[12px] leading-5 text-on-surface-variant">盒子启动后的 15 分钟内可安全配对。搜索成功后由盒子直接向云端确认，不需要输入设备码。</p>
</div>
</div>
</div>
<button id="bindingSubmitBtn" class="w-full h-12 rounded-full bg-primary text-on-primary font-label-md text-label-md flex items-center justify-center gap-2 active:scale-[0.98] transition-all" type="submit">
<span class="material-symbols-outlined text-[20px]">wifi_find</span>
搜索并绑定盒子
</button>
<p id="bindingFeedback" class="min-h-[20px] font-sans text-[12px] leading-5 text-on-surface-variant"></p>
</form>
<div class="mt-4 app-soft-card bg-white p-4">
<div class="flex items-center justify-between gap-3">
<div>
<p class="font-display text-[15px] font-bold text-on-surface">已绑定设备</p>
<p class="mt-1 font-sans text-[12px] text-on-surface-variant">绑定成功后会进入摄像头配置。</p>
</div>
<span id="bindingListBadge" class="rounded-full bg-surface-container-low px-3 py-1 font-sans text-[11px] text-on-surface-variant">0 台</span>
</div>
<div id="bindingList" class="mt-3 space-y-3"></div>
</div>
</section>
<div class="mt-stack-lg text-center">
<button class="font-label-md text-label-md text-primary hover:text-primary-fixed-dim underline-offset-4 hover:underline transition-all">
                盒子还没配网？先连接 GoHome 热点完成 Wi-Fi 配网
            </button>
</div>
</main>
