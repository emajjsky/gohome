<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>回家 - 实时查看</title>

<link rel="icon" href="data:,"/>
<link rel="stylesheet" href="assets/styles/stitch-app-adapt.css?v=20260708-product-flow-2"/>
  <style>
    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-top-reserved: max(var(--safe-top), 38px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --bg: #f6f7f3;
      --surface: #fffefc;
      --line: rgba(70, 82, 70, 0.13);
      --text: #202520;
      --muted: #687168;
      --primary: #536d5a;
      --primary-strong: #1f2a22;
      --primary-soft: #e8efe8;
      --good: #2d7d5c;
      --warn: #b66e3f;
      --danger: #ba1a1a;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--text); }
    body {
      font-family: "Noto Sans SC Local", "PingFang SC", "Hiragino Sans GB", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }
    button { font: inherit; }
    .phone-page {
      width: min(100vw, 430px);
      min-height: 100dvh;
      margin: 0 auto;
      padding: calc(16px + var(--safe-top-reserved)) 18px calc(104px + var(--safe-bottom));
      background:
        radial-gradient(circle at 18% 0%, rgba(255, 255, 255, 0.96) 0%, rgba(255, 255, 255, 0) 38%),
        linear-gradient(180deg, #f8f9f4 0%, var(--bg) 48%, #eef1ea 100%);
    }
    .topbar {
      height: 48px;
      display: grid;
      grid-template-columns: 48px 1fr 48px;
      align-items: center;
      gap: 8px;
    }
    .icon-button {
      width: 44px;
      height: 44px;
      border: 0;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.68);
      color: var(--text);
      box-shadow: 0 8px 20px rgba(60, 73, 58, 0.06);
      backdrop-filter: blur(14px);
    }
    .page-title {
      margin: 0;
      text-align: center;
      font-size: 17px;
      line-height: 24px;
      font-weight: 900;
      color: var(--text);
    }
    .panel {
      margin-top: 16px;
      padding: 18px;
      border-radius: 28px;
      background: var(--surface);
      border: 1px solid var(--line);
      box-shadow: 0 18px 44px rgba(54, 67, 53, 0.075);
    }
    .eyebrow {
      display: block;
      margin-bottom: 8px;
      color: var(--primary);
      font-size: 12px;
      line-height: 16px;
      font-weight: 800;
      letter-spacing: 0.12em;
    }
    .panel h1, .panel h2 {
      margin: 0;
      font-size: 24px;
      line-height: 31px;
      font-weight: 800;
      letter-spacing: 0;
    }
    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 21px;
      font-weight: 500;
    }
    .badge-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    .pill {
      min-height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 5px 10px;
      border-radius: 999px;
      background: #f3f1ef;
      color: #5f6672;
      font-size: 12px;
      line-height: 16px;
      font-weight: 700;
      white-space: nowrap;
    }
    .pill.good { background: #eaf5ef; color: var(--good); }
    .pill.warn { background: #fbefe8; color: var(--warn); }
    .stage {
      position: relative;
      margin-top: 18px;
      aspect-ratio: 16 / 10;
      overflow: hidden;
      border-radius: 22px;
      background: #101820;
      border: 1px solid #1f2937;
    }
    .stage img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      background: #101820;
    }
    .stage-shade {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(180deg, rgba(4, 10, 18, 0.58), rgba(4, 10, 18, 0.04) 42%, rgba(4, 10, 18, 0.64));
    }
    .stage-badges {
      position: absolute;
      left: 12px;
      right: 12px;
      top: 12px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      pointer-events: none;
    }
    .stage-badges .pill { background: rgba(255,255,255,0.18); color: #fff; backdrop-filter: blur(10px); }
    .empty-state {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 24px;
      text-align: center;
      color: rgba(255,255,255,0.86);
      background: radial-gradient(circle at top, rgba(35, 82, 125, 0.45), rgba(5, 12, 20, 0.96));
    }
    .hidden { display: none !important; }
    .empty-state strong { font-size: 18px; line-height: 24px; }
    .empty-state span { max-width: 260px; color: rgba(255,255,255,0.72); font-size: 13px; line-height: 20px; }
    .metric-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }
    .metric {
      min-height: 70px;
      padding: 12px;
      border-radius: 18px;
      background: #f8faf5;
      border: 1px solid var(--line);
    }
    .metric span { display: block; color: #79818e; font-size: 12px; font-weight: 800; }
    .metric strong { display: block; margin-top: 10px; font-size: 16px; line-height: 20px; }
    .action-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }
    .btn {
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 14px;
      background: var(--surface);
      color: var(--text);
      font-size: 14px;
      font-weight: 800;
      white-space: nowrap;
    }
    .btn.primary {
      background: var(--primary-strong);
      border-color: var(--primary-strong);
      color: #fff;
      box-shadow: 0 16px 34px rgba(54, 67, 53, 0.18);
    }
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    .section-head h2 { font-size: 21px; line-height: 28px; }
    .source-list, .profile-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .profile-list {
      flex-direction: row;
      overflow-x: auto;
      padding-bottom: 2px;
    }
    .watch-source-button {
      width: 100%;
      min-height: 66px;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 12px 14px;
      background: var(--surface);
      text-align: left;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--text);
    }
    .watch-source-button em { font-style: normal; align-self: center; }
    .watch-source-button.active {
      border-color: rgba(83, 109, 90, 0.24);
      background: var(--primary-soft);
    }
    .watch-source-button strong, .watch-source-button span { display: block; }
    .watch-source-button span { margin-top: 3px; color: var(--muted); font-size: 12px; }
    .profile-button {
      min-width: 86px;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface);
      color: var(--text);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }
    .profile-button.active { background: var(--primary-strong); border-color: var(--primary-strong); color: #fff; }
    .bottom-nav {
      position: fixed;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: min(100%, 430px);
      min-height: 82px;
      padding: 10px 10px calc(10px + var(--safe-bottom));
      border-radius: 0;
      background: linear-gradient(180deg, rgba(246, 247, 243, 0), rgba(246, 247, 243, 0.92) 24%, rgba(246, 247, 243, 0.98));
      box-shadow: none;
      backdrop-filter: blur(22px);
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      align-items: center;
      z-index: 20;
    }
    .bottom-nav a {
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }
    .bottom-nav a.active { color: var(--primary-strong); background: var(--primary-soft); border-radius: 999px; min-height: 54px; }
    .material-symbols-outlined { font-size: 22px; line-height: 1; }
  </style>
</head>
<body>
  <main class="phone-page">
    <header class="topbar">
      <a id="watchMonitorTopLink" class="icon-button" href="monitor.html" aria-label="返回守护">
        <span class="material-symbols-outlined">arrow_back</span>
      </a>
      <p class="page-title">实时查看</p>
      <button id="watchFullscreenButton" class="icon-button" type="button" aria-label="全屏">
        <span class="material-symbols-outlined">fullscreen</span>
      </button>
    </header>

    <section class="panel">
      <span class="eyebrow">实时</span>
      <h1 id="watchFact">正在连接画面</h1>
      <p id="watchMeta" class="subtitle">等待家庭盒子返回第一帧。</p>
      <div class="badge-row">
        <span id="watchHeaderSub" class="pill">连接中</span>
        <span id="watchStatusBadge" class="pill warn">等待帧</span>
      </div>

      <div id="watchStage" class="stage">
        <img id="watchStageImage" alt="实时画面"/>
        <div class="stage-shade"></div>
        <div class="stage-badges">
          <span id="watchRoomBadge" class="pill">未选择</span>
          <span id="watchProfileBadge" class="pill">流畅</span>
          <span id="watchDetectorBadge" class="pill">视觉</span>
        </div>
        <div id="watchEmptyState" class="empty-state">
          <strong>等待实时画面</strong>
          <span id="watchEmptyText">在线只代表盒子已接入；这里会在收到第一帧后显示画面。</span>
        </div>
      </div>

      <div class="metric-grid">
        <div class="metric"><span>状态</span><strong id="watchEventTitle">等待事件</strong></div>
        <div class="metric"><span>最近</span><strong id="watchEventMeta">画面接通后刷新</strong></div>
      </div>

      <div class="action-row">
        <a id="watchDetectionLink" class="btn primary" href="monitor.html">
          <span class="material-symbols-outlined">security</span>
          回守护
        </a>
        <a id="watchEventsLink" class="btn" href="events.html">
          <span class="material-symbols-outlined">history</span>
          看事件
        </a>
      </div>
    </section>

    <section class="panel">
      <div class="section-head">
        <h2>切换来源</h2>
        <span id="watchCameraCount" class="pill">未接入</span>
      </div>
      <div id="watchCameraList" class="source-list"></div>
      <a id="watchMonitorLink" class="btn" style="width:100%; margin-top:14px;" href="monitor.html">
        <span class="material-symbols-outlined">shield</span>
        回到守护
      </a>
    </section>

    <section class="panel">
      <div class="section-head">
        <h2>清晰度</h2>
      </div>
      <div id="watchProfileList" class="profile-list"></div>
    </section>
  </main>

  <nav class="bottom-nav">
    <a href="index.html"><span class="material-symbols-outlined">home</span>首页</a>
    <a class="active" href="monitor.html"><span class="material-symbols-outlined">shield</span>守护</a>
    <a href="events.html"><span class="material-symbols-outlined">history</span>事件</a>
    <a href="companionship.html"><span class="material-symbols-outlined">diversity_3</span>陪伴</a>
    <a href="privacy.html"><span class="material-symbols-outlined">person</span>我的</a>
  </nav>

  <script src="assets/scripts/edge-client.js?v=20260713-swr-1"></script>
  <script src="assets/scripts/watch-live.js?v=20260709-cloud-stream-1"></script>
  <script src="assets/scripts/stitch-app-routes.js?v=20260708-product-flow-2"></script>
</body>
</html>
