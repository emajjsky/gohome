<script>
        // Simple time updater for the video overlay
        function updateTime() {
            const timeElement = document.getElementById('current-time');
            if (timeElement) {
                const now = new Date();
                timeElement.textContent = now.toLocaleTimeString('zh-CN', { hour12: false });
            }
        }
        setInterval(updateTime, 1000);
        updateTime();

        // Subtle header background reveal on scroll
        const scrollArea = document.querySelector('.overflow-y-auto');
        const header = document.getElementById('app-header');

        if (scrollArea && header) {
            scrollArea.addEventListener('scroll', () => {
                if (scrollArea.scrollTop > 20) {
                    header.classList.add('bg-surface/80', 'backdrop-blur-md', 'shadow-sm');
                    header.classList.remove('bg-transparent');
                } else {
                    header.classList.remove('bg-surface/80', 'backdrop-blur-md', 'shadow-sm');
                    header.classList.add('bg-transparent');
                }
            });
        }
    </script>

<script id="gohome-stitch-route-links">
  (() => {
    const routes = {
      "首页": "index.html",
      "守护": "monitor.html",
      "消息": "events.html",
      "陪伴": "companionship.html",
      "我的": "privacy.html",
      "实时画面": "watch.html",
      "事件列表": "events.html",
      "规则设置": "rules.html",
      "家庭成员": "family_members.html",
      "通知设置": "notifications.html",
      "隐私与数据": "privacy_data.html",
      "添加摄像头": "connect.html",
      "设备管理": "cameras.html"
    };
    document.addEventListener("click", (event) => {
      const item = event.target.closest("a, button");
      if (!item) return;
      if (item.hasAttribute("onclick")) return;
      const href = item.getAttribute("href");
      if (href && href !== "#") return;
      const text = (item.innerText || item.textContent || "").replace(/\s+/g, "").trim();
      const route = routes[text];
      if (!route) return;
      event.preventDefault();
      window.location.href = route;
    });
  })();
</script>
