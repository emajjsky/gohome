<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>服务后台 - 回家</title>
    <link href="assets/styles/material-symbols.css" rel="stylesheet">
    <style>
        :root {
            --ops-bg: #f5f2ed;
            --ops-panel: #fffdf9;
            --ops-panel-soft: #eee9e1;
            --ops-text: #24211f;
            --ops-muted: #6a645f;
            --ops-line: #ded6cb;
            --ops-primary: #275f8f;
            --ops-primary-soft: #e5eef7;
            --ops-good: #2f7657;
            --ops-warn: #9b6326;
            --ops-danger: #b3261e;
        }

        * { box-sizing: border-box; }

        html,
        body {
            min-height: 100%;
            margin: 0;
            background: var(--ops-bg);
            color: var(--ops-text);
            font-family: "Noto Sans SC", "PingFang SC", "Hiragino Sans GB", system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        body {
            min-height: 100dvh;
        }

        button,
        input,
        select {
            font: inherit;
        }

        button {
            cursor: pointer;
        }

        .material-symbols-outlined {
            font-variation-settings: "FILL" 0, "wght" 420, "GRAD" 0, "opsz" 24;
        }

        .ops-shell {
            width: min(1180px, calc(100vw - 32px));
            margin: 0 auto;
            padding: 28px 0 40px;
        }

        .ops-header {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 18px;
            align-items: end;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--ops-line);
        }

        .ops-kicker {
            margin: 0 0 8px;
            color: var(--ops-primary);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.08em;
        }

        h1,
        h2,
        p {
            margin: 0;
        }

        h1 {
            font-size: clamp(28px, 4vw, 44px);
            line-height: 1.08;
            letter-spacing: 0;
        }

        h2 {
            font-size: 18px;
            line-height: 1.25;
        }

        .ops-subtitle {
            max-width: 720px;
            margin-top: 12px;
            color: var(--ops-muted);
            font-size: 14px;
            line-height: 1.75;
        }

        .ops-header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .ops-button {
            min-height: 42px;
            border: 1px solid var(--ops-line);
            border-radius: 8px;
            background: var(--ops-panel);
            color: var(--ops-text);
            padding: 0 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 700;
        }

        .ops-button.primary {
            border-color: var(--ops-primary);
            background: var(--ops-primary);
            color: #ffffff;
        }

        .ops-button:active {
            transform: translateY(1px);
        }

        .ops-layout {
            display: grid;
            grid-template-columns: 280px minmax(0, 1fr);
            gap: 18px;
            margin-top: 18px;
        }

        .ops-panel {
            border: 1px solid var(--ops-line);
            border-radius: 8px;
            background: var(--ops-panel);
        }

        .ops-side {
            position: sticky;
            top: 18px;
            align-self: start;
            padding: 14px;
        }

        .ops-stat {
            display: grid;
            gap: 4px;
            padding: 14px;
            border-radius: 8px;
            background: var(--ops-panel-soft);
        }

        .ops-stat + .ops-stat {
            margin-top: 10px;
        }

        .ops-stat span {
            color: var(--ops-muted);
            font-size: 12px;
            font-weight: 700;
        }

        .ops-stat strong {
            font-size: 16px;
            overflow-wrap: anywhere;
        }

        .ops-policy {
            margin-top: 14px;
            padding: 14px;
            border-top: 1px solid var(--ops-line);
            color: var(--ops-muted);
            font-size: 13px;
            line-height: 1.7;
        }

        .ops-main {
            display: grid;
            gap: 18px;
        }

        .ops-section {
            padding: 18px;
        }

        .ops-section-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }

        .ops-section-head p {
            margin-top: 5px;
            color: var(--ops-muted);
            font-size: 13px;
            line-height: 1.55;
        }

        .ops-provider-list {
            display: grid;
            gap: 12px;
        }

        .ops-provider {
            border: 1px solid var(--ops-line);
            border-radius: 8px;
            background: #fffaf4;
            padding: 14px;
        }

        .ops-provider-top {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 12px;
            align-items: start;
        }

        .ops-provider-id {
            color: var(--ops-muted);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.02em;
        }

        .ops-provider-title {
            margin-top: 4px;
            font-size: 18px;
            font-weight: 800;
            overflow-wrap: anywhere;
        }

        .ops-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: flex-end;
        }

        .ops-badge {
            min-height: 26px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 4px 10px;
            background: var(--ops-primary-soft);
            color: var(--ops-primary);
            font-size: 12px;
            font-weight: 800;
        }

        .ops-badge.good {
            background: #e6f1eb;
            color: var(--ops-good);
        }

        .ops-badge.warn {
            background: #fff0dc;
            color: var(--ops-warn);
        }

        .ops-badge.danger {
            background: #ffe7e3;
            color: var(--ops-danger);
        }

        .ops-form {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            margin-top: 14px;
        }

        .ops-field {
            display: grid;
            gap: 6px;
        }

        .ops-field.full {
            grid-column: 1 / -1;
        }

        .ops-field label {
            color: var(--ops-muted);
            font-size: 12px;
            font-weight: 800;
        }

        .ops-input,
        .ops-select {
            width: 100%;
            min-height: 42px;
            border: 1px solid var(--ops-line);
            border-radius: 8px;
            background: #fffdf9;
            color: var(--ops-text);
            padding: 0 12px;
            font-size: 14px;
        }

        .ops-input:focus,
        .ops-select:focus {
            outline: 3px solid rgba(39, 95, 143, 0.14);
            border-color: var(--ops-primary);
        }

        .ops-toggle-line {
            min-height: 42px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 0 12px;
            border: 1px solid var(--ops-line);
            border-radius: 8px;
            background: #fffdf9;
        }

        .ops-toggle-line input {
            width: 20px;
            height: 20px;
            accent-color: var(--ops-primary);
        }

        .ops-form-actions {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding-top: 2px;
        }

        .ops-feedback {
            color: var(--ops-muted);
            font-size: 13px;
        }

        .ops-empty {
            padding: 24px;
            border-radius: 8px;
            background: var(--ops-panel-soft);
            color: var(--ops-muted);
            font-size: 14px;
        }

        @media (max-width: 820px) {
            .ops-shell {
                width: min(100vw - 24px, 430px);
                padding-top: 18px;
            }

            .ops-header,
            .ops-layout,
            .ops-form,
            .ops-provider-top {
                grid-template-columns: minmax(0, 1fr);
            }

            .ops-side {
                position: static;
            }

            .ops-badges,
            .ops-header-actions,
            .ops-form-actions {
                justify-content: stretch;
            }

            .ops-button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="ops-shell">
        <header class="ops-header">
            <div>
                <p class="ops-kicker">GOHOME OPS</p>
                <h1>服务后台</h1>
                <p class="ops-subtitle">模型 provider、密钥状态和亲情关怀生成服务的运维配置入口。</p>
            </div>
            <div class="ops-header-actions">
                <a class="ops-button" href="app-shell.html?app=1">
                    <span class="material-symbols-outlined">arrow_back</span>
                    回到 App
                </a>
                <button id="opsRefreshBtn" class="ops-button primary" type="button">
                    <span class="material-symbols-outlined">sync</span>
                    刷新
                </button>
            </div>
        </header>

        <div class="ops-layout">
            <aside class="ops-panel ops-side">
                <div class="ops-stat">
                    <span>服务状态</span>
                    <strong id="opsServiceStatus">连接中</strong>
                </div>
                <div class="ops-stat">
                    <span>数据存储</span>
                    <strong id="opsStoreKind">-</strong>
                </div>
                <div class="ops-stat">
                    <span>模型配置</span>
                    <strong id="opsProviderSummary">-</strong>
                </div>
                <div class="ops-policy">
                    <strong>密钥策略</strong>
                    <p id="opsSecretPolicy">读取中</p>
                </div>
            </aside>

            <main class="ops-main">
                <section class="ops-panel ops-section">
                    <div class="ops-section-head">
                        <div>
                            <h2>模型与生成服务</h2>
                            <p>文本模型先用于每日关怀文案，生图 provider 只服务非证据型卡片。</p>
                        </div>
                    </div>
                    <div id="opsProviderList" class="ops-provider-list">
                        <div class="ops-empty">正在读取 provider 配置</div>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <script src="assets/scripts/edge-client.js?v=20260707-ops-1"></script>
    <script src="assets/scripts/ops-live.js?v=20260707-ops-1"></script>
</body>
</html>
