<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>服务后台 - 回家</title>

<link rel="icon" href="data:,"/>
<link href="assets/styles/material-symbols.css" rel="stylesheet">
    <style>
        :root {
            --ops-bg: #f6f7f3;
            --ops-panel: #fffefc;
            --ops-panel-soft: #eef2eb;
            --ops-text: #202520;
            --ops-muted: #687168;
            --ops-line: rgba(70, 82, 70, 0.13);
            --ops-primary: #536d5a;
            --ops-primary-strong: #1f2a22;
            --ops-primary-soft: #e8efe8;
            --ops-good: #2f7657;
            --ops-warn: #9b6326;
            --ops-danger: #b3261e;
        }

        * { box-sizing: border-box; }

        html,
        body {
            min-height: 100%;
            margin: 0;
            background:
                radial-gradient(circle at 18% 0%, rgba(255, 255, 255, 0.96) 0%, rgba(255, 255, 255, 0) 38%),
                linear-gradient(180deg, #f8f9f4 0%, var(--ops-bg) 48%, #eef1ea 100%);
            color: var(--ops-text);
            font-family: "Noto Sans SC", "PingFang SC", "Hiragino Sans GB", system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        body {
            min-height: 100dvh;
        }

        button,
        input,
        select {
            font: inherit;
        }

        button {
            cursor: pointer;
        }

        .material-symbols-outlined {
            font-variation-settings: "FILL" 0, "wght" 420, "GRAD" 0, "opsz" 24;
        }

        .ops-shell {
            width: min(1180px, calc(100vw - 32px));
            margin: 0 auto;
            padding: 28px 0 40px;
        }

        .ops-header {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 18px;
            align-items: end;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--ops-line);
        }

        .ops-kicker {
            margin: 0 0 8px;
            color: var(--ops-primary);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.08em;
        }

        h1,
        h2,
        p {
            margin: 0;
        }

        h1 {
            font-size: clamp(28px, 4vw, 44px);
            line-height: 1.08;
            letter-spacing: 0;
        }

        h2 {
            font-size: 18px;
            line-height: 1.25;
        }

        .ops-subtitle {
            max-width: 720px;
            margin-top: 12px;
            color: var(--ops-muted);
            font-size: 14px;
            line-height: 1.75;
        }

        .ops-header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .ops-button {
            min-height: 42px;
            border: 1px solid var(--ops-line);
            border-radius: 999px;
            background: var(--ops-panel);
            color: var(--ops-text);
            padding: 0 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 700;
        }

        .ops-button.primary {
            border-color: var(--ops-primary);
            background: var(--ops-primary);
            color: #ffffff;
        }

        .ops-button:active {
            transform: translateY(1px);
        }

        .ops-layout {
            display: grid;
            grid-template-columns: 280px minmax(0, 1fr);
            gap: 18px;
            margin-top: 18px;
        }

        .ops-panel {
            border: 1px solid var(--ops-line);
            border-radius: 8px;
            background: var(--ops-panel);
        }

        .ops-side {
            position: sticky;
            top: 18px;
            align-self: start;
            padding: 14px;
        }

        .ops-stat {
            display: grid;
            gap: 4px;
            padding: 14px;
            border-radius: 8px;
            background: var(--ops-panel-soft);
        }

        .ops-stat + .ops-stat {
            margin-top: 10px;
        }

        .ops-stat span {
            color: var(--ops-muted);
            font-size: 12px;
            font-weight: 700;
        }

        .ops-stat strong {
            font-size: 16px;
            overflow-wrap: anywhere;
        }

        .ops-policy {
            margin-top: 14px;
            padding: 14px;
            border-top: 1px solid var(--ops-line);
            color: var(--ops-muted);
            font-size: 13px;
            line-height: 1.7;
        }

        .ops-main {
            display: grid;
            gap: 18px;
        }

        .ops-section {
            padding: 18px;
        }

        .ops-section-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }

        .ops-section-head p {
            margin-top: 5px;
            color: var(--ops-muted);
            font-size: 13px;
            line-height: 1.55;
        }

        .ops-provider-list {
            display: grid;
            gap: 12px;
        }

        .ops-capability {
            border: 1px solid var(--ops-line);
            border-radius: 8px;
            background: #fffaf4;
            padding: 14px;
        }

        .ops-capability-head {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 12px;
            align-items: start;
        }

        .ops-capability-id {
            color: var(--ops-muted);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.02em;
        }

        .ops-capability h3 {
            margin-top: 4px;
            font-size: 18px;
            font-weight: 800;
            overflow-wrap: anywhere;
        }

        .ops-capability-desc {
            margin-top: 8px;
            color: var(--ops-muted);
            font-size: 13px;
            line-height: 1.55;
        }

        .ops-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: flex-end;
        }

        .ops-badge {
            min-height: 26px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 4px 10px;
            background: var(--ops-primary-soft);
            color: var(--ops-primary);
            font-size: 12px;
            font-weight: 800;
        }

        .ops-badge.good {
            background: #e6f1eb;
            color: var(--ops-good);
        }

        .ops-badge.warn {
            background: #fff0dc;
            color: var(--ops-warn);
        }

        .ops-badge.danger {
            background: #ffe7e3;
            color: var(--ops-danger);
        }

        .ops-field-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            margin-top: 14px;
        }

        .ops-read-field {
            min-height: 72px;
            display: grid;
            align-content: center;
            gap: 6px;
            border-radius: 8px;
            background: #fffdf9;
            border: 1px solid var(--ops-line);
            padding: 12px;
        }

        .ops-read-field span,
        .ops-prompt-block span,
        .ops-env-block > span {
            color: var(--ops-muted);
            font-size: 12px;
            font-weight: 800;
        }

        .ops-read-field strong {
            font-size: 14px;
            overflow-wrap: anywhere;
        }

        .ops-prompt-block,
        .ops-env-block {
            margin-top: 12px;
            border: 1px solid var(--ops-line);
            border-radius: 8px;
            background: #fffdf9;
            padding: 12px;
        }

        .ops-prompt-block pre {
            margin: 8px 0 0;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
            color: var(--ops-text);
            font-family: inherit;
            font-size: 13px;
            line-height: 1.65;
        }

        .ops-env-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            margin-top: 10px;
        }

        .ops-env-row em {
            width: 72px;
            font-style: normal;
            color: var(--ops-muted);
            font-size: 12px;
            font-weight: 800;
        }

        .ops-env-row code {
            max-width: 100%;
            border-radius: 6px;
            background: var(--ops-panel-soft);
            padding: 5px 7px;
            font-size: 12px;
            color: var(--ops-text);
            overflow-wrap: anywhere;
        }

        .ops-empty {
            padding: 24px;
            border-radius: 8px;
            background: var(--ops-panel-soft);
            color: var(--ops-muted);
            font-size: 14px;
        }

        @media (max-width: 820px) {
            .ops-shell {
                width: min(100vw - 24px, 430px);
                padding-top: calc(18px + env(safe-area-inset-top, 0px));
            }

            .ops-header,
            .ops-layout,
            .ops-field-grid,
            .ops-capability-head {
                grid-template-columns: minmax(0, 1fr);
            }

            .ops-side {
                position: static;
            }

            .ops-badges,
            .ops-header-actions {
                justify-content: stretch;
            }

            .ops-button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="ops-shell">
        <header class="ops-header">
            <div>
                <p class="ops-kicker">GOHOME OPS</p>
                <h1>服务后台</h1>
                <p class="ops-subtitle">平台内部模型能力状态页。家属用户不配置模型、Base URL、API Key 或 Prompt。</p>
            </div>
            <div class="ops-header-actions">
                <a class="ops-button" href="index.html?app=1">
                    <span class="material-symbols-outlined">arrow_back</span>
                    回到 App
                </a>
                <button id="opsRefreshBtn" class="ops-button primary" type="button">
                    <span class="material-symbols-outlined">sync</span>
                    刷新
                </button>
            </div>
        </header>

        <div class="ops-layout">
            <aside class="ops-panel ops-side">
                <div class="ops-stat">
                    <span>服务状态</span>
                    <strong id="opsServiceStatus">连接中</strong>
                </div>
                <div class="ops-stat">
                    <span>数据存储</span>
                    <strong id="opsStoreKind">-</strong>
                </div>
                <div class="ops-stat">
                    <span>模型能力</span>
                    <strong id="opsCapabilitySummary">-</strong>
                </div>
                <div class="ops-policy">
                    <strong>密钥策略</strong>
                    <p id="opsSecretPolicy">读取中</p>
                </div>
            </aside>

            <main class="ops-main">
                <section class="ops-panel ops-section">
                    <div class="ops-section-head">
                        <div>
                            <h2>平台模型能力</h2>
                            <p>当前只需要两类能力：多模态语言模型生成每日关怀内容，生图模型生成 4:7 温馨漫画图文卡片。</p>
                        </div>
                    </div>
                    <div id="opsCapabilityList" class="ops-provider-list">
                        <div class="ops-empty">正在读取模型能力状态</div>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <script src="assets/scripts/edge-client.js?v=20260707-ops-2"></script>
    <script src="assets/scripts/ops-live.js?v=20260707-ops-2"></script>
</body>
</html>
