<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>事件动态 - 回家看看</title>
    <link href="assets/styles/tailwind.css" rel="stylesheet">
    <link href="assets/styles/material-symbols.css" rel="stylesheet">
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
        .material-symbols-outlined.fill { font-variation-settings: 'FILL' 1; }
        html, body, .font-display, .font-sans { font-family: "Microsoft YaHei", "微软雅黑", "PingFang SC", "Hiragino Sans GB", Arial, sans-serif !important; }
        body { background-color: #f9f9ff; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-on-surface font-sans antialiased min-h-screen flex flex-col md:max-w-[480px] md:mx-auto md:shadow-2xl md:bg-white relative pb-24">
    
    <header class="flex justify-between items-center px-container py-6 sticky top-0 z-40 bg-surface/80 backdrop-blur-md md:bg-white/80">
        <div class="flex items-center gap-2">
            <h1 class="font-display text-2xl font-extrabold text-on-surface tracking-tight">事件动态</h1>
        </div>
        <button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-variant transition-colors text-outline">
            <span class="material-symbols-outlined">filter_list</span>
        </button>
    </header>

    <main class="flex-1 px-container flex flex-col gap-6 pt-2 pb-8">
        <!-- 标签栏 -->
        <section class="flex gap-2 overflow-x-auto no-scrollbar pb-1 -mx-container px-container">
            <button class="px-5 py-2 rounded-full bg-primary text-on-primary font-sans text-sm font-semibold shadow-soft shrink-0">全部</button>
            <button class="px-5 py-2 rounded-full bg-white text-on-surface-variant font-sans text-sm font-medium border border-outline-variant/30 shrink-0 shadow-sm">安全预警</button>
            <button class="px-5 py-2 rounded-full bg-white text-on-surface-variant font-sans text-sm font-medium border border-outline-variant/30 shrink-0 shadow-sm">生活记录</button>
            <button class="px-5 py-2 rounded-full bg-white text-on-surface-variant font-sans text-sm font-medium border border-outline-variant/30 shrink-0 shadow-sm">系统通知</button>
        </section>

        <!-- 时间轴 -->
        <section class="relative pl-7 mt-2">
            <!-- 垂直连接线 -->
            <div class="absolute left-3 top-4 bottom-4 w-px bg-outline-variant/30"></div>
            
            <div class="flex flex-col gap-5">
                <!-- 紧急事件 -->
                <a href="event_detail.html" class="relative block group">
                    <div class="absolute -left-[35px] top-4 w-6 h-6 rounded-full bg-white border-2 border-error flex items-center justify-center z-10 shadow-sm">
                        <div class="w-2.5 h-2.5 rounded-full bg-error animate-ping absolute opacity-50"></div>
                        <div class="w-2.5 h-2.5 rounded-full bg-error relative"></div>
                    </div>
                    <div class="bg-white rounded-2xl p-5 shadow-soft border border-error/20 group-hover:shadow-md transition-shadow">
                        <div class="flex justify-between items-start mb-3">
                            <div class="flex items-center gap-1.5 text-on-surface-variant font-sans text-xs font-semibold">
                                <span class="material-symbols-outlined text-[16px]">schedule</span> 09:42
                                <span class="w-1 h-1 rounded-full bg-outline-variant mx-1"></span>
                                <span class="material-symbols-outlined text-[16px]">living</span> 客厅
                            </div>
                            <span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors">chevron_right</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="w-11 h-11 rounded-full bg-error/10 flex items-center justify-center text-error shrink-0">
                                <span class="material-symbols-outlined fill">warning</span>
                            </div>
                            <div>
                                <h3 class="font-display text-lg font-bold text-on-surface">客厅疑似跌倒</h3>
                                <p class="font-sans text-sm text-error font-medium mt-0.5">请立即确认老人状态</p>
                            </div>
                        </div>
                    </div>
                </a>

                <!-- 注意事件 -->
                <div class="relative block group">
                    <div class="absolute -left-[35px] top-4 w-6 h-6 rounded-full bg-white border-2 border-warning flex items-center justify-center z-10">
                        <div class="w-2 h-2 rounded-full bg-warning"></div>
                    </div>
                    <div class="bg-white rounded-2xl p-5 shadow-soft border border-outline-variant/20 group-hover:shadow-md transition-shadow">
                        <div class="flex justify-between items-start mb-3">
                            <div class="flex items-center gap-1.5 text-on-surface-variant font-sans text-xs font-semibold">
                                <span class="material-symbols-outlined text-[16px]">schedule</span> 12:30
                                <span class="w-1 h-1 rounded-full bg-outline-variant mx-1"></span>
                                <span class="material-symbols-outlined text-[16px]">restaurant</span> 厨房
                            </div>
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="w-11 h-11 rounded-full bg-warning/10 flex items-center justify-center text-warning shrink-0">
                                <span class="material-symbols-outlined">notifications_active</span>
                            </div>
                            <div>
                                <h3 class="font-display text-base font-bold text-on-surface">午饭时间未见活动</h3>
                                <p class="font-sans text-sm text-on-surface-variant mt-0.5">较日常规律延迟了1小时</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 普通事件 -->
                <div class="relative block group">
                    <div class="absolute -left-[35px] top-4 w-6 h-6 rounded-full bg-white border-2 border-primary flex items-center justify-center z-10">
                        <div class="w-2 h-2 rounded-full bg-primary"></div>
                    </div>
                    <div class="bg-white rounded-2xl p-5 shadow-soft border border-outline-variant/20 group-hover:shadow-md transition-shadow">
                        <div class="flex justify-between items-start mb-3">
                            <div class="flex items-center gap-1.5 text-on-surface-variant font-sans text-xs font-semibold">
                                <span class="material-symbols-outlined text-[16px]">schedule</span> 16:00
                                <span class="w-1 h-1 rounded-full bg-outline-variant mx-1"></span>
                                <span class="material-symbols-outlined text-[16px]">home</span> 全屋
                            </div>
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="w-11 h-11 rounded-full bg-primary/10 flex items-center justify-center text-primary shrink-0">
                                <span class="material-symbols-outlined fill">favorite</span>
                            </div>
                            <div>
                                <h3 class="font-display text-base font-bold text-on-surface">活动规律正常</h3>
                                <p class="font-sans text-sm text-on-surface-variant mt-0.5">下午在客厅有适量走动</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 底部署名 -->
        <div class="mt-4 bg-surface-container-low rounded-xl p-5 flex flex-col items-center justify-center text-center gap-2 border border-outline-variant/20">
            <span class="material-symbols-outlined text-primary text-[28px]">verified</span>
            <p class="font-sans text-sm text-on-surface-variant font-medium">已展示今日所有动态</p>
        </div>
    </main>

    <!-- 底部悬浮导航 -->
    <nav class="fixed bottom-0 left-0 w-full z-50 px-6 pb-8 pt-4 bg-white/90 backdrop-blur-xl border-t border-outline-variant/20 md:max-w-[480px] md:left-1/2 md:-translate-x-1/2 shadow-[0_-10px_40px_rgba(0,0,0,0.03)]">
        <div class="flex justify-between items-center">
            <a href="index.html" class="flex flex-col items-center gap-1.5 text-outline hover:text-primary transition-colors group">
                <div class="w-12 h-8 rounded-full flex items-center justify-center group-hover:bg-primary/5 transition-colors">
                    <span class="material-symbols-outlined text-[22px]">home</span>
                </div>
                <span class="font-sans text-[11px] font-semibold tracking-wide">首页</span>
            </a>
            <a href="monitor.html" class="flex flex-col items-center gap-1.5 text-outline hover:text-primary transition-colors group">
                <div class="w-12 h-8 rounded-full flex items-center justify-center group-hover:bg-primary/5 transition-colors">
                    <span class="material-symbols-outlined text-[22px]">nest_cam_indoor</span>
                </div>
                <span class="font-sans text-[11px] font-semibold tracking-wide">监控</span>
            </a>
            <a href="events.html" class="flex flex-col items-center gap-1.5 text-primary">
                <div class="w-12 h-8 rounded-full bg-primary/15 flex items-center justify-center transition-colors">
                    <span class="material-symbols-outlined fill text-[22px]">history</span>
                </div>
                <span class="font-sans text-[11px] font-bold tracking-wide">事件</span>
            </a>
            <a href="companionship.html" class="flex flex-col items-center gap-1.5 text-outline hover:text-primary transition-colors group">
                <div class="w-12 h-8 rounded-full flex items-center justify-center group-hover:bg-primary/5 transition-colors">
                    <span class="material-symbols-outlined text-[22px]">diversity_1</span>
                </div>
                <span class="font-sans text-[11px] font-semibold tracking-wide">陪伴</span>
            </a>
            <a href="privacy.html" class="flex flex-col items-center gap-1.5 text-outline hover:text-primary transition-colors group">
                <div class="w-12 h-8 rounded-full flex items-center justify-center group-hover:bg-primary/5 transition-colors">
                    <span class="material-symbols-outlined text-[22px]">person</span>
                </div>
                <span class="font-sans text-[11px] font-semibold tracking-wide">我的</span>
            </a>
        </div>
    </nav>
</body>
</html>
