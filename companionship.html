<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
<title>回家 - 陪伴</title>
<script src="assets/scripts/app-state-store.js?v=20260714-appstore-5"></script>
<link rel="icon" href="data:,"/>
<link rel="stylesheet" href="assets/styles/tailwind.css?v=20260708-local-1"/>
<link rel="stylesheet" href="assets/styles/stitch-app-adapt.css?v=20260708-product-flow-1"/>
<link rel="stylesheet" href="assets/styles/editorial-home-companion.css?v=20260714-editorial-1"/>
</head>
<body class="gohome-page-companionship bg-white text-[#111111] min-h-screen">
<header class="editorial-topbar" aria-label="陪伴工具栏">
  <div class="editorial-topbar-actions">
    <a class="editorial-icon-button" href="care_schedule.html" data-route="care_schedule.html" aria-label="关怀设置">
      <span class="material-symbols-outlined">more_horiz</span>
    </a>
  </div>
</header>

<main class="editorial-main">
  <section class="companion-profile" aria-labelledby="companionshipProfileName">
    <div class="companion-avatar">
      <img id="companionshipProfileImage" src="assets/stitch-images/28-ea16817784.jpg" alt="联系人头像"/>
      <i id="companionshipProfileStatus" class="companion-avatar-status" aria-hidden="true"></i>
    </div>
    <h2 id="companionshipProfileName">家庭联系人</h2>
    <p id="companionshipProfileMeta">资料同步后显示所在城市</p>
    <div id="companionshipContactActions" class="companion-contact-actions"></div>
  </section>

  <section id="companionshipCareSection" class="hidden editorial-section">
    <div class="editorial-section-head">
      <h3>今日关怀</h3>
      <span id="companionshipCareStatus" class="editorial-section-link">今日</span>
    </div>
    <article class="companion-care-card">
      <div id="companionshipCareImageFrame" class="companion-care-image">
        <img id="companionshipCareImage" class="hidden" alt="今日关怀图文" loading="eager"/>
        <div id="companionshipCareImageFallback">
          <span class="material-symbols-outlined">volunteer_activism</span>
          <p>图文内容准备中</p>
        </div>
      </div>
      <div class="companion-care-copy">
        <p id="companionshipCareMeta" class="text-[10px] text-[#9a9a94] mb-1">今日</p>
        <h3 id="companionshipCareTitle">今天值得联系一下</h3>
        <p id="companionshipCareBody">结合天气、日历和关注内容整理联系理由。</p>
        <div id="companionshipCareFacts" class="gohome-mini-facts"></div>
        <div id="companionshipCareActions" class="gohome-contact-actions"></div>
      </div>
    </article>
  </section>

  <section id="companionshipTopicSection" class="editorial-section">
    <div class="editorial-section-head">
      <h3>可以聊聊</h3>
      <button id="companionshipTopicRefresh" class="editorial-section-link" type="button">
        <span class="material-symbols-outlined text-[15px]">refresh</span>换一批
      </button>
    </div>
    <div id="companionshipTopicList" class="companion-topic-list">
      <div class="companion-topic">
        <span class="material-symbols-outlined">chat</span>
        <p>今日内容整理好后，会给出自然、能够远程完成的联系话题。</p>
        <button type="button" aria-label="复制话题"><span class="material-symbols-outlined">content_copy</span></button>
      </div>
    </div>
  </section>

  <section id="companionshipImportantSection" class="editorial-section">
    <div class="editorial-section-head">
      <h3>重要日子</h3>
      <a class="editorial-section-link" href="care_schedule.html" data-route="care_schedule.html" aria-label="编辑重要日期">
        <span class="material-symbols-outlined">add</span>
      </a>
    </div>
    <div id="companionshipImportantList" class="companion-important-list">
      <div class="companion-important-row">
        <span class="material-symbols-outlined">event</span>
        <div><h4>还没有添加重要日期</h4><p>可在关怀设置中添加纪念日和提前提醒</p></div>
        <strong>待添加</strong>
      </div>
    </div>
  </section>

  <section id="companionshipMessageSection" class="hidden editorial-section">
    <div class="editorial-section-head">
      <div>
        <h3>关怀记录</h3>
        <p id="companionshipMessageMeta">最近的关怀提醒</p>
      </div>
      <span id="companionshipMessageCount" class="editorial-section-link">0 条</span>
    </div>
    <p id="companionshipMessageFeedback" class="hidden text-[12px] text-[#686864] mb-2"></p>
    <div id="companionshipMessageList" class="companion-message-list"></div>
  </section>
</main>

<nav class="editorial-bottom-nav" aria-label="主导航">
  <a href="index.html" data-route="index.html"><span class="material-symbols-outlined">home</span><span>首页</span></a>
  <a href="monitor.html" data-route="monitor.html"><span class="material-symbols-outlined">shield</span><span>守护</span></a>
  <a href="events.html" data-route="events.html"><span class="material-symbols-outlined">event_note</span><span>事件</span></a>
  <a class="active" href="companionship.html" data-route="companionship.html" aria-current="page"><span class="material-symbols-outlined">volunteer_activism</span><span>陪伴</span></a>
  <a href="privacy.html" data-route="privacy.html"><span class="material-symbols-outlined">person</span><span>我的</span></a>
</nav>

<script src="assets/scripts/edge-client.js?v=20260714-perf-3"></script>
<script src="assets/scripts/companionship-live.js?v=20260714-editorial-1"></script>
<script src="assets/scripts/stitch-app-data.js?v=20260713-appstore-1"></script>
<script src="assets/scripts/stitch-app-routes.js?v=20260708-product-flow-1"></script>
</body>
</html>
