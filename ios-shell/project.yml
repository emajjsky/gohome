name: GoHomeShell
options:
  minimumXcodeGenVersion: 2.38.0
settings:
  base:
    SWIFT_VERSION: 5.10
    IPHONEOS_DEPLOYMENT_TARGET: 16.0
    PRODUCT_BUNDLE_IDENTIFIER: com.gohome.family
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
targets:
  GoHomeShell:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: GoHomeShell/Sources
    info:
      path: GoHomeShell/Config/Info.plist
    settings:
      base:
        PRODUCT_NAME: GoHomeShell
        INFOPLIST_FILE: GoHomeShell/Config/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        DEVELOPMENT_ASSET_PATHS: ""
schemes:
  GoHomeShell:
    build:
      targets:
        GoHomeShell: all
    run:
      config: Debug
