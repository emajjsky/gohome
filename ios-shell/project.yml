name: GoHomeShell
options:
  minimumXcodeGenVersion: 2.38.0
settings:
  base:
    SWIFT_VERSION: 5.10
    IPHONEOS_DEPLOYMENT_TARGET: 16.0
    PRODUCT_BUNDLE_IDENTIFIER: com.gohome.family
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
targets:
  GoHomeShell:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: GoHomeShell/Sources
    resources:
      - path: GoHomeShell/Resources
    settings:
      base:
        PRODUCT_NAME: GoHomeShell
        INFOPLIST_FILE: GoHomeShell/Config/Info.plist
        CODE_SIGN_ENTITLEMENTS: GoHomeShell/Config/GoHomeShell.entitlements
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        DEVELOPMENT_ASSET_PATHS: ""
  GoHomeShellTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: GoHomeShellTests
    dependencies:
      - target: GoHomeShell
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gohome.family.tests
        GENERATE_INFOPLIST_FILE: YES
  GoHomeShellUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: GoHomeShellUITests
    dependencies:
      - target: GoHomeShell
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gohome.family.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: GoHomeShell
schemes:
  GoHomeShell:
    build:
      targets:
        GoHomeShell: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - GoHomeShellTests
        - GoHomeShellUITests
