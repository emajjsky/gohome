<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>接入摄像头 - 想家了吗</title>
    <link href="assets/styles/tailwind.css" rel="stylesheet">
    <link href="assets/styles/material-symbols.css" rel="stylesheet">
    <link href="assets/styles/app.css?v=20260629-ui2" rel="stylesheet">
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
        .material-symbols-outlined.fill { font-variation-settings: 'FILL' 1; }
        html, body, .font-display, .font-sans { font-family: var(--app-font-family); }
        body { background-color: #f9f9ff; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        input { outline: none; }
        input:focus { box-shadow: 0 0 0 3px rgba(88, 108, 214, .14); }
    </style>
</head>
<body class="app-phone-shell text-on-surface font-sans antialiased">
    <header class="app-topbar">
        <a id="connectBackLink" href="device_binding.html?app=1" class="app-topbar-side">
            <span class="material-symbols-outlined">arrow_back</span>
        </a>
        <p class="app-topbar-title">接入摄像头</p>
        <a id="connectTopMonitorLink" href="monitor.html?app=1" class="app-topbar-side">
            <span class="material-symbols-outlined text-[20px]">nest_cam_indoor</span>
        </a>
    </header>

    <main class="app-main app-stack">
        <section class="app-home-hero p-5 flex flex-col gap-4">
            <div class="flex items-start justify-between gap-4">
                <div class="min-w-0">
                    <p class="font-sans text-[11px] font-semibold text-primary tracking-[0.16em]">本机算力服务</p>
                    <h2 id="edgeConnectionStatus" class="font-display text-[22px] font-bold text-on-surface tracking-tight mt-1">正在连接守护服务</h2>
                    <p id="edgeConnectionSubtitle" class="font-sans text-[13px] text-on-surface-variant leading-relaxed mt-2">这一步只负责把家里的摄像头接到本机服务。</p>
                </div>
                <div class="w-11 h-11 rounded-full bg-[#eef5ff] text-primary flex items-center justify-center shrink-0">
                    <span class="material-symbols-outlined text-[22px]">nest_cam_indoor</span>
                </div>
            </div>
            <div class="grid grid-cols-3 gap-3">
                <div class="app-kpi">
                    <p>已保存</p>
                    <p id="edgeCameraCount">-</p>
                </div>
                <div class="app-kpi">
                    <p>主位置</p>
                    <p id="edgeActiveRoom">-</p>
                </div>
                <div class="app-kpi">
                    <p>最近测试</p>
                    <p id="edgeLastTest">-</p>
                </div>
            </div>
        </section>

        <section class="app-panel px-5 py-5 flex flex-col gap-4">
            <div>
                <p class="font-display text-[18px] font-bold text-on-surface">添加局域网摄像头</p>
                <p class="font-sans text-[12px] text-on-surface-variant leading-relaxed mt-1.5">摄像头和这台 Mac 在同一个路由器下时，只需要填 IP、账号和密码。</p>
            </div>

            <form id="cameraConnectForm" class="flex flex-col gap-3">
                <div class="grid grid-cols-2 gap-3">
                    <label class="flex flex-col gap-1.5">
                        <span class="font-sans text-[11px] font-bold text-on-surface-variant ml-1">名称</span>
                        <input id="cameraName" class="h-11 rounded-2xl bg-surface-container px-4 font-sans text-[13px] font-semibold text-on-surface" value="局域网摄像头" autocomplete="off">
                    </label>
                    <label class="flex flex-col gap-1.5">
                        <span class="font-sans text-[11px] font-bold text-on-surface-variant ml-1">房间</span>
                        <input id="cameraRoom" class="h-11 rounded-2xl bg-surface-container px-4 font-sans text-[13px] font-semibold text-on-surface" value="客厅" autocomplete="off">
                    </label>
                </div>

                <div class="grid grid-cols-[1fr_86px] gap-3">
                    <label class="flex flex-col gap-1.5">
                        <span class="font-sans text-[11px] font-bold text-on-surface-variant ml-1">摄像头 IP</span>
                        <input id="cameraHost" class="h-11 rounded-2xl bg-surface-container px-4 font-sans text-[13px] font-semibold text-on-surface" value="192.168.1.11" inputmode="decimal" autocomplete="off">
                    </label>
                    <label class="flex flex-col gap-1.5">
                        <span class="font-sans text-[11px] font-bold text-on-surface-variant ml-1">端口</span>
                        <input id="cameraPort" class="h-11 rounded-2xl bg-surface-container px-4 font-sans text-[13px] font-semibold text-on-surface" value="554" inputmode="numeric" autocomplete="off">
                    </label>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <label class="flex flex-col gap-1.5">
                        <span class="font-sans text-[11px] font-bold text-on-surface-variant ml-1">账号</span>
                        <input id="cameraUsername" class="h-11 rounded-2xl bg-surface-container px-4 font-sans text-[13px] font-semibold text-on-surface" value="admin" autocomplete="off">
                    </label>
                    <label class="flex flex-col gap-1.5">
                        <span class="font-sans text-[11px] font-bold text-on-surface-variant ml-1">密码</span>
                        <input id="cameraPassword" type="password" class="h-11 rounded-2xl bg-surface-container px-4 font-sans text-[13px] font-semibold text-on-surface" autocomplete="off" placeholder="已保存可留空">
                    </label>
                </div>

                <label class="flex flex-col gap-1.5">
                    <span class="font-sans text-[11px] font-bold text-on-surface-variant ml-1">视频路径</span>
                    <input id="cameraPath" class="h-11 rounded-2xl bg-surface-container px-4 font-sans text-[13px] font-semibold text-on-surface" value="/" autocomplete="off">
                </label>

                <div class="grid grid-cols-2 gap-3 pt-1">
                    <button id="testCameraButton" class="h-11 rounded-2xl bg-primary text-white font-sans text-[13px] font-bold shadow-float flex items-center justify-center gap-2" type="button">
                        <span class="material-symbols-outlined text-[18px]">play_circle</span>
                        测试画面
                    </button>
                    <button id="saveCameraButton" class="h-11 rounded-2xl bg-[#f4f6fb] text-on-surface font-sans text-[13px] font-semibold border border-outline-variant/15 flex items-center justify-center gap-2" type="submit">
                        <span class="material-symbols-outlined text-[18px]">save</span>
                        保存启用
                    </button>
                </div>
            </form>
        </section>

        <section class="app-panel overflow-hidden">
            <div class="relative aspect-video bg-black">
                <img id="connectionPreviewImage" class="hidden w-full h-full object-cover opacity-90" alt="摄像头测试截图">
                <div id="connectionPreviewEmpty" class="absolute inset-0 grid place-content-center text-center text-white/80">
                    <span class="material-symbols-outlined text-[36px]">photo_camera</span>
                    <p class="font-sans text-[12px] font-semibold mt-2">测试后显示真实画面</p>
                </div>
                <div class="absolute left-4 right-4 bottom-4 rounded-2xl bg-black/35 backdrop-blur-md border border-white/10 p-3 text-white">
                    <p id="connectionResultTitle" class="font-display text-[15px] font-bold">等待测试</p>
                    <p id="connectionResultText" class="font-sans text-[12px] text-white/78 mt-1">保存前先测试一帧，确认本机服务能读到画面。</p>
                </div>
            </div>
        </section>

        <section id="connectNextStepSection" class="hidden app-panel p-4 flex flex-col gap-3">
            <div class="flex items-center justify-between gap-3">
                <p class="font-display text-[16px] font-bold text-on-surface">下一步</p>
                <span id="connectNextStepBadge" class="app-section-badge shrink-0">待接入</span>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <a id="connectMonitorLink" href="monitor.html?app=1" class="app-btn-secondary h-11 flex items-center justify-center font-sans text-[13px] font-bold">守护</a>
                <a id="connectWatchLink" href="watch.html?app=1" class="app-btn-secondary h-11 flex items-center justify-center font-sans text-[13px] font-bold">实时</a>
            </div>
        </section>

        <section class="flex flex-col gap-3">
            <div class="flex items-center justify-between">
                <h3 class="font-display text-[18px] font-bold text-on-surface">已接入摄像头</h3>
                <span id="cameraListBadge" class="app-section-badge shrink-0">加载中</span>
            </div>
            <div id="cameraList" class="flex flex-col gap-3"></div>
        </section>
    </main>

    <nav class="app-bottom-nav">
        <div class="app-bottom-nav-inner">
            <div class="flex justify-between items-center">
                <a href="index.html?app=1" class="flex flex-col items-center gap-1.5 text-outline hover:text-primary transition-colors group">
                    <div class="app-nav-pill group-hover:bg-primary/5"><span class="material-symbols-outlined text-[22px]">home</span></div>
                    <span class="font-sans text-[11px] font-semibold tracking-wide">首页</span>
                </a>
                <a id="connectNavMonitorLink" href="monitor.html?app=1" class="flex flex-col items-center gap-1.5 text-primary">
                    <div class="app-nav-pill active"><span class="material-symbols-outlined fill text-[22px]">nest_cam_indoor</span></div>
                    <span class="font-sans text-[11px] font-bold tracking-wide">守护</span>
                </a>
                <a id="connectNavEventsLink" href="events.html?app=1" class="flex flex-col items-center gap-1.5 text-outline hover:text-primary transition-colors group">
                    <div class="app-nav-pill group-hover:bg-primary/5"><span class="material-symbols-outlined text-[22px]">history</span></div>
                    <span class="font-sans text-[11px] font-semibold tracking-wide">事件</span>
                </a>
                <a href="privacy.html?app=1" class="flex flex-col items-center gap-1.5 text-outline hover:text-primary transition-colors group">
                    <div class="app-nav-pill group-hover:bg-primary/5"><span class="material-symbols-outlined text-[22px]">person</span></div>
                    <span class="font-sans text-[11px] font-semibold tracking-wide">我的</span>
                </a>
            </div>
        </div>
    </nav>
    <script src="assets/scripts/edge-client.js?v=20260630-video1"></script>
    <script src="assets/scripts/connect-live.js?v=20260630-flow4"></script>
</body>
</html>
