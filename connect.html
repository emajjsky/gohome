<h1 id="cameraConfigTitle" class="font-headline-md text-headline-md font-bold text-on-surface">添加摄像头</h1>
<div class="w-10 h-10"></div> <!-- Spacer for centering -->
</header>
<main class="flex-1 overflow-y-auto pb-24">
<!-- Setup Progress Visualizer -->
<div class="w-full bg-surface-container-lowest pt-stack-lg pb-stack-md px-margin-page mb-stack-sm flex flex-col items-center">
<div class="relative w-48 h-48 mb-stack-md rounded-2xl overflow-hidden bg-surface-container shadow-[0_8px_24px_rgba(0,0,0,0.04)]">
<!-- Placeholder for camera hardware illustration -->
<div class="w-full h-full bg-cover bg-center" data-alt="A clean, minimalist 3D rendering of a modern white smart home security camera on a soft, warm cream background. The lighting is soft and studio-like, emphasizing the smooth curves and premium build quality of the device, fitting a dignified, high-end corporate aesthetic." style="background-image: url('assets/stitch-images/07-4ca547aed1.jpg')"></div>
</div>
<h2 id="cameraConfigHeroTitle" class="font-headline-md text-headline-md text-primary mb-2 text-center">提交给家庭盒子接入</h2>
<p class="font-body-md text-body-md text-on-surface-variant text-center max-w-[280px]">App 只负责命名和房间配置，摄像头由家庭盒子在老人家网络内接入。</p>
</div>
<div class="px-margin-page py-stack-md space-y-stack-lg">
<!-- Section: Camera Name -->
<section class="bg-surface-container-lowest rounded-2xl p-gutter-card shadow-[0_4px_12px_rgba(0,0,0,0.02)] border border-surface-container-low">
<div class="flex items-center gap-3 mb-stack-sm text-primary">
<span class="material-symbols-outlined icon-filled">edit_square</span>
<h3 class="font-label-md text-label-md text-on-surface">设备名称</h3>
</div>
<div class="relative">
<input id="cameraNameInput" class="w-full bg-surface-container-lowest border-b-2 border-outline-variant focus:border-primary text-on-surface font-body-lg text-body-lg py-3 px-1 transition-colors outline-none placeholder:text-outline" placeholder="例如：客厅主干道监控" type="text" value="智能摄像头"/>
<button type="button" aria-label="清空摄像头名称" class="absolute right-2 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant transition-colors p-2 rounded-full" data-clear-camera-name="1">
<span class="material-symbols-outlined text-[20px]">cancel</span>
</button>
</div>
</section>
<!-- Section: Location Tags -->
<section class="bg-surface-container-lowest rounded-2xl p-gutter-card shadow-[0_4px_12px_rgba(0,0,0,0.02)] border border-surface-container-low">
<div class="flex items-center justify-between mb-stack-md">
<div class="flex items-center gap-3 text-primary">
<span class="material-symbols-outlined icon-filled">home_pin</span>
<h3 class="font-label-md text-label-md text-on-surface">安装位置</h3>
</div>
</div>
<div id="roomChoiceList" class="flex flex-wrap gap-3">
<div>
<input checked="" class="hidden" id="loc-living" name="location" type="radio"/>
<label class="inline-flex items-center justify-center px-4 py-2 rounded-full border border-outline-variant text-on-surface-variant font-body-md text-body-md cursor-pointer transition-all hover:bg-surface-container-low" for="loc-living">
                            客厅
                        </label>
</div>
<div>
<input class="hidden" id="loc-dining" name="location" type="radio"/>
<label class="inline-flex items-center justify-center px-4 py-2 rounded-full border border-outline-variant text-on-surface-variant font-body-md text-body-md cursor-pointer transition-all hover:bg-surface-container-low" for="loc-dining">
                            餐厅
                        </label>
</div>
<div>
<input class="hidden" id="loc-entryway" name="location" type="radio"/>
<label class="inline-flex items-center justify-center px-4 py-2 rounded-full border border-outline-variant text-on-surface-variant font-body-md text-body-md cursor-pointer transition-all hover:bg-surface-container-low" for="loc-entryway">
                            玄关
                        </label>
</div>
<div>
<input class="hidden" id="loc-bedroom" name="location" type="radio"/>
<label class="inline-flex items-center justify-center px-4 py-2 rounded-full border border-outline-variant text-on-surface-variant font-body-md text-body-md cursor-pointer transition-all hover:bg-surface-container-low" for="loc-bedroom">
                            卧室
                        </label>
</div>
<button id="addRoomButton" type="button" class="room-add-button inline-flex items-center justify-center px-4 py-2 rounded-full border border-dashed border-outline text-outline font-body-md text-body-md gap-1 transition-all active:scale-[0.98]">
<span class="material-symbols-outlined text-[18px]">add</span>
                        添加房间
                    </button>
</div>
</section>
<!-- Section: RTSP Access -->
<section class="bg-surface-container-lowest rounded-2xl p-gutter-card shadow-[0_4px_12px_rgba(0,0,0,0.02)] border border-surface-container-low">
<div class="flex items-center gap-3 mb-stack-md text-primary">
<span class="material-symbols-outlined icon-filled">settings_input_antenna</span>
<h3 class="font-label-md text-label-md text-on-surface">摄像头接入信息</h3>
</div>
<div class="space-y-4">
<label class="block">
<span class="font-body-md text-[13px] leading-5 text-on-surface-variant">摄像头 IP 或 RTSP 地址</span>
<input id="cameraHostInput" class="mt-1 w-full rounded-xl border-outline-variant bg-surface-container-lowest text-on-surface font-body-md text-body-md focus:border-primary focus:ring-primary" inputmode="url" placeholder="192.168.1.20 或 rtsp://192.168.1.20:554/1/2" type="text"/>
</label>
<div class="grid grid-cols-[104px_1fr] gap-3">
<label class="block">
<span class="font-body-md text-[13px] leading-5 text-on-surface-variant">端口</span>
<input id="cameraPortInput" class="mt-1 w-full rounded-xl border-outline-variant bg-surface-container-lowest text-on-surface font-body-md text-body-md focus:border-primary focus:ring-primary" inputmode="numeric" placeholder="554" type="text" value="554"/>
</label>
<label class="block">
<span class="font-body-md text-[13px] leading-5 text-on-surface-variant">码流路径</span>
<input id="cameraPathInput" class="mt-1 w-full rounded-xl border-outline-variant bg-surface-container-lowest text-on-surface font-body-md text-body-md focus:border-primary focus:ring-primary" placeholder="/1/2" type="text" value="/1/2"/>
</label>
</div>
<div class="grid grid-cols-2 gap-3">
<label class="block">
<span class="font-body-md text-[13px] leading-5 text-on-surface-variant">账号</span>
<input id="cameraUsernameInput" class="mt-1 w-full rounded-xl border-outline-variant bg-surface-container-lowest text-on-surface font-body-md text-body-md focus:border-primary focus:ring-primary" autocomplete="username" placeholder="admin" type="text" value="admin"/>
</label>
<label class="block">
<span class="font-body-md text-[13px] leading-5 text-on-surface-variant">密码</span>
<input id="cameraPasswordInput" class="mt-1 w-full rounded-xl border-outline-variant bg-surface-container-lowest text-on-surface font-body-md text-body-md focus:border-primary focus:ring-primary" autocomplete="current-password" placeholder="摄像头密码" type="password"/>
</label>
</div>
<p id="cameraConfigFeedback" class="min-h-[20px] font-body-md text-[13px] leading-5 text-on-surface-variant">提交后家庭盒子会在老人家网络内拉流验证，App 只显示同步状态。</p>
</div>
</section>
<!-- Section: Wi-Fi Setup Guide -->
<section class="bg-surface-container-lowest rounded-2xl p-gutter-card shadow-[0_4px_12px_rgba(0,0,0,0.02)] border border-surface-container-low relative overflow-hidden">
<div class="flex items-center gap-3 mb-stack-md text-primary relative z-10">
<span class="material-symbols-outlined icon-filled">wifi</span>
<h3 class="font-label-md text-label-md text-on-surface">盒子本地接入</h3>
</div>
<div class="space-y-4 relative z-10">
<div class="flex items-start gap-4">
<div class="w-8 h-8 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center font-label-md text-label-md shrink-0">1</div>
<div>
<p class="font-body-md text-body-md text-on-surface mb-1">确认摄像头在线</p>
<p class="font-body-md text-[14px] leading-5 text-on-surface-variant">摄像头需要先接入老人家网络，家庭盒子会在本地读取视频流。</p>
</div>
</div>
<div class="w-0.5 h-6 bg-outline-variant ml-4 rounded-full opacity-50"></div>
<div class="flex items-start gap-4">
<div class="w-8 h-8 rounded-full bg-surface-container-highest text-on-surface-variant flex items-center justify-center font-label-md text-label-md shrink-0">2</div>
<div class="w-full">
<p class="font-body-md text-body-md text-on-surface mb-2">等待家庭盒子同步</p>
<div class="w-full flex items-center justify-between bg-surface-container-low p-3 rounded-xl border border-outline-variant text-left">
<div class="flex items-center gap-3 overflow-hidden">
<span class="material-symbols-outlined text-outline">router</span>
<span class="font-body-md text-body-md text-on-surface truncate">家庭盒子 · 本地接入</span>
</div>
<span class="font-body-md text-[12px] leading-5 text-on-surface-variant">自动同步</span>
</div>
</div>
</div>
</div>
</section>

<button id="cameraSubmitButton" type="button" class="w-full bg-primary text-on-primary font-label-md text-label-md py-4 rounded-full shadow-md active:scale-[0.98] transition-all hover:bg-surface-tint flex items-center justify-center gap-2">
            提交给家庭盒子同步
        </button>
</div>
