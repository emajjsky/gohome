<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>连接摄像头 - 回家看看</title>
    <link href="assets/styles/tailwind.css" rel="stylesheet">
    <link href="assets/styles/material-symbols.css" rel="stylesheet">
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
        .material-symbols-outlined.fill { font-variation-settings: 'FILL' 1; }
        html, body, .font-display, .font-sans { font-family: "Microsoft YaHei", "微软雅黑", "PingFang SC", "Hiragino Sans GB", Arial, sans-serif !important; }
        body { background-color: #f9f9ff; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .spin-slow { animation: spin 3s linear infinite; }
        .pulse-ring { animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse-ring { 0% { transform: scale(0.8); opacity: 0.5; } 100% { transform: scale(1.5); opacity: 0; } }
    </style>
</head>
<body class="text-on-surface font-sans antialiased min-h-screen flex flex-col md:max-w-[480px] md:mx-auto md:shadow-2xl md:bg-white relative pb-8">
    
    <header class="flex justify-between items-center px-container py-6 sticky top-0 z-40 bg-surface/80 backdrop-blur-md md:bg-white/80">
        <a href="monitor.html" class="w-10 h-10 flex items-center justify-center rounded-full bg-white shadow-sm border border-outline-variant/20 hover:opacity-80 transition-opacity text-primary">
            <span class="material-symbols-outlined">arrow_back</span>
        </a>
        <h1 class="font-display text-xl font-bold text-primary tracking-tight">连接摄像头</h1>
        <div class="w-10 h-10"></div>
    </header>

    <main class="flex-1 px-container flex flex-col pt-4 pb-8 max-w-sm mx-auto w-full">
        
        <!-- 进度 -->
        <div class="flex items-center justify-center mb-10">
            <span class="font-sans text-xs font-bold text-primary bg-primary/10 px-3 py-1.5 rounded-full tracking-wider">步骤 2 / 3</span>
        </div>

        <div class="text-center mb-10">
            <h2 class="font-display text-2xl font-extrabold text-on-surface mb-2">配置视频流</h2>
            <p class="font-sans text-sm text-on-surface-variant font-medium">请提供设备地址以便我们建立安全连接。</p>
        </div>

        <!-- 输入区 -->
        <div class="bg-white rounded-2xl shadow-soft p-5 mb-8 border border-outline-variant/20">
            <div class="mb-5">
                <label class="block font-sans text-xs font-bold text-on-surface-variant mb-2 ml-1" for="stream-url">视频流地址 (RTSP/RTMP)</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                        <span class="material-symbols-outlined text-outline text-[20px]">link</span>
                    </span>
                    <input type="text" id="stream-url" class="block w-full pl-10 pr-4 py-3.5 bg-surface-container border-transparent rounded-xl focus:bg-white focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all font-sans text-sm text-on-surface font-medium" value="rtsp://admin:12345@192.168.1.100/stream">
                </div>
                <p class="mt-2.5 ml-1 font-sans text-xs text-outline flex items-center gap-1">
                    <span class="material-symbols-outlined text-[14px]">info</span>
                    可以在摄像头管理后台获取地址
                </p>
            </div>
            
            <button class="w-full bg-primary hover:bg-primary/90 text-white font-sans text-[15px] font-bold h-12 rounded-xl shadow-float transition-all flex items-center justify-center gap-2 active:scale-[0.98]">
                测试连接
                <span class="material-symbols-outlined spin-slow text-[18px]">sync</span>
            </button>
        </div>

        <!-- 状态展示 -->
        <div class="flex-1 flex flex-col items-center justify-center min-h-[220px]">
            <div class="relative w-32 h-32 flex items-center justify-center mb-6">
                <div class="absolute inset-0 bg-primary/20 rounded-full pulse-ring"></div>
                <div class="absolute inset-2 bg-primary/30 rounded-full pulse-ring" style="animation-delay: 0.5s;"></div>
                
                <div class="relative z-10 w-24 h-24 bg-white rounded-full shadow-soft flex items-center justify-center border-4 border-white overflow-hidden">
                    <img src="assets/images/chinese-mother-daughter-home.jpg" class="absolute inset-0 w-full h-full object-cover opacity-60" alt="Preview">
                    <div class="bg-primary text-white rounded-full w-8 h-8 flex items-center justify-center z-20 shadow-sm">
                        <span class="material-symbols-outlined text-[18px] font-bold">check</span>
                    </div>
                </div>
            </div>
            <p class="font-sans text-sm font-bold text-primary animate-pulse tracking-wide">连接成功，正在初始化 AI 引擎...</p>
        </div>
    </main>
</body>
</html>
