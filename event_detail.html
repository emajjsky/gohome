<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
<title>事件详情 - 回家</title>

<link rel="icon" href="data:,"/>
<link rel="stylesheet" href="assets/styles/stitch-app-adapt.css?v=20260708-product-flow-2"/>
<style>
  :root {
    --bg: #f6f7f3;
    --panel: #fffefc;
    --soft: #eef2eb;
    --line: rgba(70, 82, 70, 0.13);
    --text: #202520;
    --muted: #687168;
    --primary: #536d5a;
    --primary-strong: #1f2a22;
    --primary-soft: #e8efe8;
    --warn: #ba1a1a;
    --warn-soft: #ffdad6;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-top-reserved: max(var(--safe-top), 38px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100dvh;
    background:
      radial-gradient(circle at 18% 0%, rgba(255, 255, 255, 0.96) 0%, rgba(255, 255, 255, 0) 38%),
      linear-gradient(180deg, #f8f9f4 0%, var(--bg) 48%, #eef1ea 100%);
    color: var(--text);
    font-family: "Noto Sans SC Local", "PingFang SC", "Hiragino Sans GB", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 430, "GRAD" 0, "opsz" 24; }
  .page {
    width: min(100%, 430px);
    margin: 0 auto;
    padding: calc(18px + var(--safe-top-reserved)) 20px calc(116px + var(--safe-bottom));
  }
  .topbar {
    display: grid;
    grid-template-columns: 42px minmax(0, 1fr) 42px;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .icon-button {
    width: 42px;
    height: 42px;
    border-radius: 999px;
    border: 1px solid rgba(255, 255, 255, 0.72);
    background: rgba(255, 255, 255, 0.68);
    color: var(--text);
    box-shadow: 0 8px 20px rgba(60, 73, 58, 0.06);
    backdrop-filter: blur(14px);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
  }
  .title {
    text-align: center;
    min-width: 0;
  }
  .title h1 {
    margin: 0;
    font-size: 20px;
    line-height: 1.15;
  }
  .title p {
    margin: 5px 0 0;
    color: var(--muted);
    font-size: 12px;
    font-weight: 700;
  }
  .hero,
  .panel {
    border-radius: 24px;
    border: 1px solid var(--line);
    background: var(--panel);
    box-shadow: 0 14px 34px rgba(54, 67, 53, 0.06);
  }
  .hero {
    padding: 18px;
  }
  .hero-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
  }
  .pill {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 28px;
    border-radius: 999px;
    padding: 5px 10px;
    background: var(--warn-soft);
    color: #93000a;
    font-size: 12px;
    font-weight: 800;
    white-space: nowrap;
  }
  .time {
    color: var(--muted);
    font-size: 13px;
    font-weight: 700;
  }
  .hero h2 {
    margin: 0;
    font-size: 24px;
    line-height: 1.22;
  }
  .hero p {
    margin: 10px 0 0;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.6;
  }
  .media {
    position: relative;
    margin-top: 14px;
    aspect-ratio: 16 / 9;
    overflow: hidden;
    border-radius: 18px;
    background: #17202a;
  }
  .media img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .media img:not([src]),
  .media img[src=""] {
    display: none;
  }
  .media-fallback {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    color: rgba(255, 255, 255, 0.78);
    text-align: center;
    padding: 18px;
  }
  .panel {
    margin-top: 14px;
    padding: 16px;
  }
  .row {
    display: grid;
    grid-template-columns: 88px minmax(0, 1fr);
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--line);
  }
  .row:last-child { border-bottom: 0; }
  .row-label {
    color: var(--muted);
    font-size: 13px;
  }
  .row-value {
    color: var(--text);
    font-size: 14px;
    font-weight: 800;
    line-height: 1.45;
  }
  .row-value small {
    display: block;
    margin-top: 3px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
  }
  .evidence h3 {
    margin: 0 0 10px;
    font-size: 18px;
  }
  .evidence p {
    margin: 0;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.65;
  }
  .evidence p + p { margin-top: 10px; }
  .bottom-actions {
    position: fixed;
    left: 50%;
    bottom: 0;
    z-index: 50;
    width: min(100%, 430px);
    transform: translateX(-50%);
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1.2fr);
    gap: 10px;
    padding: 12px 20px calc(14px + var(--safe-bottom));
    background: linear-gradient(180deg, rgba(246, 247, 243, 0), rgba(246, 247, 243, 0.94) 26%, #f6f7f3 100%);
    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px);
  }
  .action {
    min-height: 48px;
    border: 0;
    border-radius: 999px;
    font-weight: 800;
    font-size: 14px;
  }
  .action.secondary {
    background: #ffffff;
    border: 1px solid var(--line);
    color: var(--text);
  }
  .action.primary {
    background: var(--primary-strong);
    color: #ffffff;
  }
  .action:disabled {
    opacity: 0.58;
  }
  .opacity-60 { opacity: 0.6; }
</style>
</head>
<body>
<main class="page">
  <header class="topbar">
    <a id="edgeDetailBackLink" class="icon-button" href="events.html?app=1" aria-label="返回事件列表">
      <span class="material-symbols-outlined">arrow_back</span>
    </a>
    <div class="title">
      <h1>事件详情</h1>
      <p>守护事件</p>
    </div>
    <a id="edgeDetailWatchLink" class="icon-button" href="watch.html?app=1" aria-label="查看实时画面">
      <span class="material-symbols-outlined">nest_cam_indoor</span>
    </a>
  </header>

  <section class="hero">
    <div class="hero-meta">
      <span id="edgeDetailTime" class="time">--:--</span>
      <span id="edgeDetailStatus" class="pill">需要确认</span>
    </div>
    <h2 id="edgeDetailHero">正在读取事件</h2>
    <p id="edgeDetailNote">连接家庭服务后，会显示这条提醒的来源和处理建议。</p>
  </section>

  <section class="media" aria-label="事件截图">
    <div class="media-fallback">
      <div>
        <span class="material-symbols-outlined">image_search</span>
        <p>等待证据截图</p>
      </div>
    </div>
    <img id="edgeDetailImage" alt="事件证据截图"/>
  </section>

  <section class="panel">
    <div class="row">
      <div class="row-label">事件</div>
      <div id="edgeDetailTitle" class="row-value">正在读取</div>
    </div>
    <div class="row">
      <div class="row-label">位置</div>
      <div id="edgeDetailRoom" class="row-value">家庭摄像头</div>
    </div>
    <div class="row">
      <div class="row-label">持续</div>
      <div class="row-value">
        <span id="edgeDetailDuration">实时事件</span>
        <small id="edgeDetailDurationHint">等待规则解释</small>
      </div>
    </div>
  </section>

  <section class="panel evidence">
    <h3>提醒依据</h3>
    <p id="edgeDetailFact">正在读取检测事实。</p>
    <p id="edgeDetailFactSub">如果这条事件由规则触发，这里会显示当前观测和规则阈值。</p>
  </section>
</main>

<div class="bottom-actions">
  <button id="edgeMarkFalsePositive" class="action secondary" type="button">标记误报</button>
  <button id="edgeMarkHandled" class="action primary" type="button">已确认安全</button>
</div>

<script src="assets/scripts/edge-client.js?v=20260709-cloud-stream-1"></script>
<script src="assets/scripts/event-detail-live.js?v=20260708-product-flow-2"></script>
<script src="assets/scripts/stitch-app-routes.js?v=20260708-product-flow-2"></script>
</body>
</html>
