<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>摄像头配置 - 回家</title>
  <link rel="stylesheet" href="/ui/assets/styles/material-symbols.css">
  <link rel="stylesheet" href="/admin/styles.css?v=20260704-pose-1">
  <link rel="stylesheet" href="/admin/console.css?v=20260721-console-5">
</head>
<body data-page="cameras" class="admin-web-page">
  <a class="skip-link" href="#main">跳到内容</a>
  <div class="admin-web-frame">
    <aside class="admin-sidebar" aria-label="管理导航">
      <div class="admin-brand">
        <span class="material-symbols-outlined" data-icon="⌂">home_iot_device</span>
        <div>
          <small>回家盒子</small>
          <strong>边缘感知台</strong>
        </div>
      </div>
      <nav class="admin-nav">
        <a href="/admin/index.html"><span class="material-symbols-outlined" data-icon="↗">monitoring</span>首页</a>
        <a class="active" href="/admin/cameras.html"><span class="material-symbols-outlined" data-icon="□">linked_camera</span>摄像头配置</a>
        <a href="/admin/algorithms.html"><span class="material-symbols-outlined" data-icon="≡">tune</span>视觉算法</a>
        <a href="/admin/events.html"><span class="material-symbols-outlined" data-icon="!">receipt_long</span>事件日志</a>
      </nav>
      <section class="admin-sidebar-controls" aria-label="服务状态">
        <span id="workerBadge" class="status-pill muted">检查中</span>
      </section>
      <div class="admin-sidebar-note">
        <span>配置来源</span>
        <strong>本地安装调试</strong>
      </div>
      <section class="admin-sidebar-session" aria-label="登录操作">
        <div class="admin-session-slot"></div>
      </section>
    </aside>

    <main id="main" class="admin-web-main">
      <header class="console-page-header">
        <div><span class="console-kicker">CAMERA I/O</span><h1>摄像头接入</h1></div>
        <p>局域网发现与链路校验</p>
      </header>
      <section class="admin-camera-grid">
        <div class="admin-camera-column">
          <section class="panel">
            <div class="panel-head compact">
              <div>
                <h2>局域网探测</h2>
                <p id="cameraDiscoveryHint">等待扫描</p>
              </div>
              <button id="discoverCameras" class="secondary-button fit-button" type="button">
                <span class="material-symbols-outlined" data-icon="⌁">radar</span>
                扫描
              </button>
            </div>
            <div id="cameraDiscoveryList" class="camera-discovery-list" aria-live="polite">
              <div class="empty-state compact">点击扫描，选择发现的摄像头。</div>
            </div>
          </section>

          <section class="panel">
            <div class="panel-head compact">
              <div>
                <h2>已接入</h2>
                <p id="cameraLimitHint">读取中</p>
              </div>
            </div>
            <div id="cameraList" class="camera-list compact" aria-live="polite"></div>
          </section>
        </div>

        <section class="panel camera-panel">
          <div class="panel-head compact">
            <div>
              <h2>接入参数</h2>
              <p id="cameraSourceHint">本页用于安装调试；正式摄像头配置由回家 App 同步到盒子。</p>
            </div>
          </div>

          <form id="cameraForm" class="camera-form admin-camera-form">
            <label class="hidden" hidden>名称<input id="cameraName" name="name" value="客厅摄像头" autocomplete="off"></label>
            <label>房间<input id="cameraRoom" name="room" value="客厅" autocomplete="off"></label>
            <label id="cameraHostField">摄像头 IP<input id="cameraHost" name="host" value="" inputmode="decimal" autocomplete="off" placeholder="例如 192.168.1.11"></label>
            <label id="cameraPortField">RTSP 端口<input id="cameraPort" name="port" value="554" inputmode="numeric" autocomplete="off"></label>
            <label id="cameraUserField">用户名<input id="cameraUsername" name="username" value="admin" autocomplete="off"></label>
            <label id="cameraPasswordField" class="wide">密码<input id="cameraPassword" name="password" type="password" autocomplete="current-password" placeholder="摄像头后台密码"></label>
            <label id="cameraChannelField">频道
              <select id="cameraChannel" name="channel">
                <option value="1" selected>1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
              </select>
            </label>
            <label id="cameraStreamField">码流
              <select id="cameraStream" name="stream">
                <option value="1">1 主码流</option>
                <option value="2" selected>2 副码流</option>
              </select>
            </label>
            <div class="form-actions wide">
              <button id="testCameraConnection" class="secondary-button" type="button">
                <span class="material-symbols-outlined" data-icon="◎">settings_input_antenna</span>
                测试连接
              </button>
              <button class="primary-button" type="submit">
                <span class="material-symbols-outlined" data-icon="✓">check_circle</span>
                保存启用
              </button>
            </div>
          </form>

          <div id="cameraTestResult" class="camera-test-result" aria-live="polite">
            <span class="status-dot muted"></span>
            <div>
              <strong>未测试</strong>
              <p>点击“测试连接”只验证拉流，不保存配置。</p>
            </div>
          </div>
        </section>
      </section>
    </main>
  </div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="/admin/console.js?v=20260721-console-1"></script>
</body>
</html>
