<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>首页 - edge-agent</title>
  <link rel="stylesheet" href="/ui/assets/styles/material-symbols.css">
  <link rel="stylesheet" href="/admin/styles.css?v=20260628-console-7">
</head>
<body data-page="home">
  <a class="skip-link" href="#main">跳到内容</a>
  <div class="admin-frame">
    <aside class="side-nav" aria-label="管理台导航">
      <div class="side-brand">
        <p class="eyebrow">想家了吗 edge-agent</p>
        <strong>本机视觉控制台</strong>
      </div>
      <nav class="side-section">
        <a class="side-link active" href="/admin/index.html"><span class="material-symbols-outlined">dashboard</span>首页</a>
        <a class="side-link" href="/admin/cameras.html"><span class="material-symbols-outlined">linked_camera</span>摄像头配置</a>
        <a class="side-link" href="/admin/algorithms.html"><span class="material-symbols-outlined">tune</span>算法配置</a>
      </nav>
    </aside>

    <main id="main" class="admin-main">
      <header class="page-head">
        <div>
          <p class="eyebrow">LIVE MONITOR</p>
          <h1>首页</h1>
          <p>首页只看现场和事件：720p 实时视频、最新检测结果、告警处理。</p>
        </div>
        <div class="page-actions">
          <span id="workerBadge" class="status-pill muted">检查中</span>
          <button id="refreshAll" class="icon-button" type="button" title="刷新">
            <span class="material-symbols-outlined">refresh</span>
          </button>
        </div>
      </header>

      <section class="home-layout">
        <div class="monitor-stack">
          <section class="panel">
            <div class="monitor-toolbar">
              <label>
                摄像头
                <select id="cameraSelect"></select>
              </label>
              <div class="monitor-status">
                <span id="streamStatus" class="status-pill muted">等待视频</span>
                <button id="captureSelected" class="secondary-button" type="button">
                  <span class="material-symbols-outlined">photo_camera</span>
                  抓取一帧
                </button>
              </div>
            </div>
            <div class="stream-frame live-frame">
              <img id="mjpegStream" alt="实时摄像头视频">
              <div id="streamEmpty" class="empty-preview stream-empty">
                <span class="material-symbols-outlined">videocam_off</span>
                <p>请选择摄像头</p>
              </div>
              <div class="stream-badge-row">
                <span id="streamCamera">无摄像头</span>
                <span id="streamFrameTime">等待检测帧</span>
              </div>
            </div>
          </section>

          <section class="panel">
            <div class="panel-head compact">
              <div>
                <h2>最新检测</h2>
                <p>worker 抽帧后的结果，用来解释为什么产生事件。</p>
              </div>
            </div>
            <div id="detectionSummary" class="detection-summary plain">
              <span class="status-pill muted">等待检测</span>
              <p>最新检测结果会显示在这里。</p>
            </div>
            <div class="preview-meta">
              <div><span>截图</span><strong id="snapshotTime">-</strong></div>
              <div><span>亮度</span><strong id="snapshotBrightness">-</strong></div>
              <div><span>对比度</span><strong id="snapshotContrast">-</strong></div>
              <div><span>变化</span><strong id="snapshotMotion">-</strong></div>
              <div><span>人数</span><strong id="snapshotPeople">-</strong></div>
              <div><span>标签</span><strong id="snapshotTags">-</strong></div>
            </div>
          </section>
        </div>

        <section id="events" class="panel event-panel">
          <div class="panel-head compact">
            <div>
              <h2>事件</h2>
              <p>只处理告警状态和截图证据。</p>
            </div>
            <div class="toolbar-actions">
              <label class="mini-select">
                <span>状态</span>
                <select id="eventFilter">
                  <option value="open">未处理</option>
                  <option value="all">全部</option>
                  <option value="done">已处理</option>
                </select>
              </label>
              <button id="clearDoneEvents" class="ghost-button" type="button">清已处理</button>
            </div>
          </div>
          <div id="eventList" class="event-list tall"></div>
          <div class="panel-head compact" style="margin-top:16px;">
            <div>
              <h2>最近候选</h2>
              <p>看见被提升或被节流抑制的候选，避免只剩最终用户事件。</p>
            </div>
          </div>
          <div id="candidateList" class="event-list"></div>
        </section>
      </section>
    </main>
  </div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="/admin/console.js?v=20260630-console-8"></script>
</body>
</html>
