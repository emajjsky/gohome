<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>首页 - 回家</title>
  <link rel="stylesheet" href="/ui/assets/styles/material-symbols.css">
  <link rel="stylesheet" href="/admin/styles.css?v=20260704-pose-1">
  <link rel="stylesheet" href="/admin/console.css?v=20260721-console-5">
</head>
<body data-page="home" class="admin-web-page">
  <a class="skip-link" href="#main">跳到内容</a>
  <div class="admin-web-frame">
    <aside class="admin-sidebar" aria-label="管理导航">
      <div class="admin-brand">
        <span class="material-symbols-outlined" data-icon="⌂">home_iot_device</span>
        <div>
          <small>回家盒子</small>
          <strong>边缘感知台</strong>
        </div>
      </div>
      <nav class="admin-nav">
        <a class="active" href="/admin/index.html"><span class="material-symbols-outlined" data-icon="↗">monitoring</span>首页</a>
        <a href="/admin/cameras.html"><span class="material-symbols-outlined" data-icon="□">linked_camera</span>摄像头配置</a>
        <a href="/admin/algorithms.html"><span class="material-symbols-outlined" data-icon="≡">tune</span>视觉算法</a>
        <a href="/admin/events.html"><span class="material-symbols-outlined" data-icon="!">receipt_long</span>事件日志</a>
      </nav>
      <section class="admin-sidebar-controls" aria-label="服务状态">
        <span id="workerBadge" class="status-pill muted">检查中</span>
      </section>
      <div class="admin-sidebar-note">
        <span>管理入口</span>
        <strong>gohome.local:8711</strong>
      </div>
      <section class="admin-sidebar-status" aria-label="当前状态">
        <div class="panel-head compact">
          <div>
            <h2>当前状态</h2>
            <p>最近一帧</p>
          </div>
        </div>
        <div id="detectionSummary" class="detection-summary plain">
          <span class="status-pill muted">等待检测</span>
          <p>等待盒子返回检测结果。</p>
        </div>
        <div class="preview-meta compact-meta">
          <div><span>截图</span><strong id="snapshotTime">-</strong></div>
          <div><span>亮度</span><strong id="snapshotBrightness">-</strong></div>
          <div><span>对比度</span><strong id="snapshotContrast">-</strong></div>
          <div><span>变化</span><strong id="snapshotMotion">-</strong></div>
          <div><span>人数</span><strong id="snapshotPeople">-</strong></div>
          <div><span>标签</span><strong id="snapshotTags">-</strong></div>
        </div>
      </section>
      <section class="admin-sidebar-session" aria-label="登录操作">
        <div class="admin-session-slot"></div>
      </section>
    </aside>

    <main id="main" class="admin-web-main">
      <header class="console-page-header">
        <div><span class="console-kicker">LIVE VIEW</span><h1>实时视野</h1></div>
        <p>本地低延迟预览</p>
      </header>
      <section class="home-layout home-monitor-layout">
        <section class="panel hero-monitor">
          <div class="monitor-toolbar">
            <label>
              摄像头
              <select id="cameraSelect"></select>
            </label>
            <div class="monitor-status">
              <span id="streamStatus" class="status-pill muted">等待视频</span>
            </div>
          </div>
          <div class="stream-frame live-frame">
            <img id="mjpegStream" alt="实时摄像头视频">
            <div id="streamEmpty" class="empty-preview stream-empty">
              <span class="material-symbols-outlined" data-icon="□">videocam_off</span>
              <p>请选择摄像头</p>
            </div>
            <div class="stream-badge-row">
              <span id="streamCamera">无摄像头</span>
              <span id="streamFrameTime">等待检测帧</span>
            </div>
          </div>
        </section>
      </section>
    </main>
  </div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="/admin/console.js?v=20260721-console-1"></script>
</body>
</html>
