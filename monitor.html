<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>实时画面 - 回家看看</title>
    <link href="assets/styles/tailwind.css" rel="stylesheet">
    <link href="assets/styles/material-symbols.css" rel="stylesheet">
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
        .material-symbols-outlined.fill { font-variation-settings: 'FILL' 1; }
        html, body, .font-display, .font-sans { font-family: "Microsoft YaHei", "微软雅黑", "PingFang SC", "Hiragino Sans GB", Arial, sans-serif !important; }
        body { background-color: #f9f9ff; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-on-surface font-sans antialiased min-h-screen flex flex-col md:max-w-[480px] md:mx-auto md:shadow-2xl md:bg-white relative pb-24">
    
    <header class="flex justify-between items-center px-container py-6 sticky top-0 z-40 bg-surface/80 backdrop-blur-md md:bg-white/80">
        <a href="index.html" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-variant transition-colors text-on-surface">
            <span class="material-symbols-outlined">arrow_back</span>
        </a>
        <h1 class="font-display text-xl font-bold text-on-surface tracking-tight">实时画面</h1>
        <a href="connect.html" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-variant transition-colors text-primary">
            <span class="material-symbols-outlined">add</span>
        </a>
    </header>

    <main class="flex-1 px-container flex flex-col gap-6 pt-2 pb-8">
        
        <!-- 房间切换 -->
        <section class="flex space-x-2 overflow-x-auto no-scrollbar pb-1 -mx-container px-container">
            <button class="px-5 py-2.5 rounded-full bg-primary text-on-primary font-sans text-sm font-semibold shadow-soft transition-all shrink-0">客厅</button>
            <button class="px-5 py-2.5 rounded-full bg-white text-on-surface-variant font-sans text-sm font-medium border border-outline-variant/30 transition-all hover:bg-surface-container-high shrink-0 shadow-sm">厨房</button>
            <button class="px-5 py-2.5 rounded-full bg-white text-on-surface-variant font-sans text-sm font-medium border border-outline-variant/30 transition-all hover:bg-surface-container-high shrink-0 shadow-sm">入户门</button>
        </section>

        <!-- 视频主视图 -->
        <section class="bg-surface-container-lowest rounded-2xl shadow-soft overflow-hidden relative border border-outline-variant/20 flex flex-col">
            <div class="relative w-full aspect-video bg-black">
                <img src="assets/images/elderly-alone.jpg" class="w-full h-full object-cover object-[center_38%] opacity-90" alt="监控画面">
                <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-black/30 pointer-events-none"></div>
                
                <div class="absolute top-4 left-4 right-4 flex justify-between items-start pointer-events-none">
                    <div class="flex flex-col gap-2">
                        <div class="flex items-center gap-1.5 bg-black/40 backdrop-blur-md rounded-full px-2.5 py-1">
                            <span class="w-1.5 h-1.5 rounded-full bg-red-500 animate-ping"></span>
                            <span class="font-sans text-[10px] font-bold text-white tracking-wider">LIVE</span>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <div class="bg-black/40 backdrop-blur-md rounded-full px-2 py-1 flex items-center">
                            <span class="material-symbols-outlined text-white text-[14px]">wifi</span>
                        </div>
                    </div>
                </div>

                <!-- 操作按钮 -->
                <div class="absolute bottom-4 left-0 right-0 flex justify-center items-end gap-5 pointer-events-none px-4">
                    <button class="w-11 h-11 rounded-full bg-white/20 backdrop-blur-md flex items-center justify-center text-white hover:bg-white/30 transition-colors pointer-events-auto border border-white/10">
                        <span class="material-symbols-outlined text-[20px]">photo_camera</span>
                    </button>
                    <button class="w-14 h-14 rounded-full bg-primary flex items-center justify-center text-white hover:bg-primary/90 transition-colors pointer-events-auto shadow-float">
                        <span class="material-symbols-outlined fill text-[26px]">mic</span>
                    </button>
                    <button class="w-11 h-11 rounded-full bg-white/20 backdrop-blur-md flex items-center justify-center text-white hover:bg-white/30 transition-colors pointer-events-auto border border-white/10">
                        <span class="material-symbols-outlined text-[20px]">fullscreen</span>
                    </button>
                </div>
            </div>
            
            <div class="p-5 flex justify-between items-center bg-white">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-green-50 flex items-center justify-center text-green-600">
                        <span class="material-symbols-outlined">verified_user</span>
                    </div>
                    <div>
                        <h3 class="font-display text-base font-bold text-on-surface">暂无异常</h3>
                        <p class="font-sans text-xs text-on-surface-variant font-medium">设备运行正常</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- 设置项 -->
        <section class="bg-surface-container-lowest rounded-2xl shadow-soft p-5 border border-outline-variant/20">
            <div class="flex justify-between items-center">
                <div class="flex items-start gap-3">
                    <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center text-primary shrink-0">
                        <span class="material-symbols-outlined fill text-[20px]">bedtime</span>
                    </div>
                    <div>
                        <h3 class="font-display text-base font-bold text-on-surface">勿扰模式</h3>
                        <p class="font-sans text-xs text-on-surface-variant font-medium mt-0.5 leading-relaxed">仅在检测到跌倒等紧急情况时发送提醒，避免日常打扰。</p>
                    </div>
                </div>
                <label class="relative inline-flex items-center cursor-pointer shrink-0 ml-2">
                    <input type="checkbox" class="sr-only peer" checked>
                    <div class="w-11 h-6 bg-outline-variant/50 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
                </label>
            </div>
        </section>
        
        <section class="bg-surface-container-lowest rounded-2xl shadow-soft p-5 border border-outline-variant/20">
            <a href="rules.html" class="flex justify-between items-center group cursor-pointer">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center text-primary shrink-0">
                        <span class="material-symbols-outlined text-[20px]">rule_settings</span>
                    </div>
                    <h3 class="font-display text-base font-bold text-on-surface">监护规则设置</h3>
                </div>
                <span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors">chevron_right</span>
            </a>
        </section>
    </main>

    <!-- 底部悬浮导航 -->
    <nav class="fixed bottom-0 left-0 w-full z-50 px-6 pb-8 pt-4 bg-white/90 backdrop-blur-xl border-t border-outline-variant/20 md:max-w-[480px] md:left-1/2 md:-translate-x-1/2 shadow-[0_-10px_40px_rgba(0,0,0,0.03)]">
        <div class="flex justify-between items-center">
            <a href="index.html" class="flex flex-col items-center gap-1.5 text-outline hover:text-primary transition-colors group">
                <div class="w-12 h-8 rounded-full flex items-center justify-center group-hover:bg-primary/5 transition-colors">
                    <span class="material-symbols-outlined text-[22px]">home</span>
                </div>
                <span class="font-sans text-[11px] font-semibold tracking-wide">首页</span>
            </a>
            <a href="monitor.html" class="flex flex-col items-center gap-1.5 text-primary">
                <div class="w-12 h-8 rounded-full bg-primary/15 flex items-center justify-center transition-colors">
                    <span class="material-symbols-outlined fill text-[22px]">nest_cam_indoor</span>
                </div>
                <span class="font-sans text-[11px] font-bold tracking-wide">监控</span>
            </a>
            <a href="events.html" class="flex flex-col items-center gap-1.5 text-outline hover:text-primary transition-colors group">
                <div class="w-12 h-8 rounded-full flex items-center justify-center group-hover:bg-primary/5 transition-colors">
                    <span class="material-symbols-outlined text-[22px]">history</span>
                </div>
                <span class="font-sans text-[11px] font-semibold tracking-wide">事件</span>
            </a>
            <a href="companionship.html" class="flex flex-col items-center gap-1.5 text-outline hover:text-primary transition-colors group">
                <div class="w-12 h-8 rounded-full flex items-center justify-center group-hover:bg-primary/5 transition-colors">
                    <span class="material-symbols-outlined text-[22px]">diversity_1</span>
                </div>
                <span class="font-sans text-[11px] font-semibold tracking-wide">陪伴</span>
            </a>
            <a href="privacy.html" class="flex flex-col items-center gap-1.5 text-outline hover:text-primary transition-colors group">
                <div class="w-12 h-8 rounded-full flex items-center justify-center group-hover:bg-primary/5 transition-colors">
                    <span class="material-symbols-outlined text-[22px]">person</span>
                </div>
                <span class="font-sans text-[11px] font-semibold tracking-wide">我的</span>
            </a>
        </div>
    </nav>
</body>
</html>
