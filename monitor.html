<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>守护 - 想家了吗</title>
    <link href="assets/styles/tailwind.css" rel="stylesheet">
    <link href="assets/styles/material-symbols.css" rel="stylesheet">
    <link href="assets/styles/app.css" rel="stylesheet">
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
        .material-symbols-outlined.fill { font-variation-settings: 'FILL' 1; }
        html, body, .font-display, .font-sans { font-family: var(--app-font-family); }
        body { background-color: #f9f9ff; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-on-surface font-sans antialiased min-h-screen flex flex-col md:max-w-[480px] md:mx-auto md:shadow-2xl md:bg-white relative pb-24">

    <main class="flex-1 px-container flex flex-col gap-6 pt-5 pb-8">
        <section class="flex space-x-2 overflow-x-auto no-scrollbar pb-1 -mx-container px-container">
            <button class="px-4 py-2.5 rounded-full bg-primary text-white font-sans text-[12px] font-bold shadow-soft transition-all shrink-0">客厅</button>
            <button class="px-4 py-2.5 rounded-full bg-white text-on-surface-variant font-sans text-[12px] font-semibold border border-outline-variant/25 transition-all shrink-0 shadow-sm">厨房</button>
            <button class="px-4 py-2.5 rounded-full bg-white text-on-surface-variant font-sans text-[12px] font-semibold border border-outline-variant/25 transition-all shrink-0 shadow-sm">入户门</button>
        </section>

        <section class="bg-white rounded-[28px] shadow-soft overflow-hidden relative border border-outline-variant/20 flex flex-col">
            <div class="relative w-full aspect-video bg-black">
                <img src="assets/images/elderly-alone.jpg" class="w-full h-full object-cover object-[center_38%] opacity-92" alt="客厅画面">
                <div class="absolute inset-0 bg-gradient-to-t from-black/55 via-transparent to-black/25 pointer-events-none"></div>
                <div class="absolute top-4 left-4 right-4 flex items-start justify-between gap-3">
                    <div class="flex items-center gap-2">
                        <span class="px-3 py-1 rounded-full bg-black/35 backdrop-blur-md text-white text-[10px] font-bold tracking-[0.12em]">15:20 更新</span>
                        <span class="px-3 py-1 rounded-full bg-white/18 border border-white/20 backdrop-blur-md text-white text-[10px] font-semibold">客厅</span>
                    </div>
                    <div class="w-9 h-9 rounded-full bg-black/35 backdrop-blur-md text-white flex items-center justify-center">
                        <span class="material-symbols-outlined text-[16px]">wifi</span>
                    </div>
                </div>
                <div class="absolute left-4 right-4 bottom-4">
                    <div class="rounded-2xl bg-black/30 backdrop-blur-md border border-white/10 p-3 text-white">
                        <p class="font-sans text-[10px] font-semibold tracking-[0.14em] text-white/80">今天最安心的是</p>
                        <p class="font-display text-[16px] font-bold mt-1">她午饭后在客厅安静休息，没有异常起伏</p>
                    </div>
                </div>
            </div>
            <div class="p-5 bg-white flex flex-col gap-3">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-[#edf6ee] flex items-center justify-center text-[#2d7d5c] shrink-0">
                        <span class="material-symbols-outlined text-[20px]">health_and_safety</span>
                    </div>
                    <div>
                        <h3 class="font-display text-[17px] font-bold text-on-surface">暂无异常</h3>
                        <p class="font-sans text-[12px] text-on-surface-variant mt-1">今天只需要安心。</p>
                    </div>
                </div>
            </div>
        </section>

        <section class="grid grid-cols-3 gap-3">
            <div class="app-rhythm-mini p-3">
                <p class="font-sans text-[10px] font-semibold text-primary tracking-[0.12em]">事实</p>
                <p class="font-display text-[15px] font-bold text-on-surface mt-1.5">活动正常</p>
            </div>
            <div class="app-rhythm-mini p-3">
                <p class="font-sans text-[10px] font-semibold text-[#c87b2a] tracking-[0.12em]">感受</p>
                <p class="font-display text-[15px] font-bold text-on-surface mt-1.5">家里安静</p>
            </div>
            <div class="app-rhythm-mini p-3">
                <p class="font-sans text-[10px] font-semibold text-[#2d7d5c] tracking-[0.12em]">下一步</p>
                <p class="font-display text-[15px] font-bold text-on-surface mt-1.5">打个电话</p>
            </div>
        </section>

        <section class="bg-surface-container-lowest rounded-2xl shadow-soft p-5 border border-outline-variant/20">
            <div class="flex justify-between items-center gap-4">
                <div class="flex items-start gap-3">
                    <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center text-primary shrink-0">
                        <span class="material-symbols-outlined fill text-[20px]">bedtime</span>
                    </div>
                    <div>
                        <h3 class="font-display text-base font-bold text-on-surface">勿扰模式</h3>
                        <p class="font-sans text-xs text-on-surface-variant font-medium mt-0.5 leading-relaxed">只提醒必要情况。</p>
                    </div>
                </div>
                <label class="relative inline-flex items-center cursor-pointer shrink-0">
                    <input type="checkbox" class="sr-only peer" checked>
                    <div class="w-11 h-6 bg-outline-variant/50 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
                </label>
            </div>
        </section>

        <section class="bg-surface-container-lowest rounded-2xl shadow-soft p-5 border border-outline-variant/20">
            <a href="connect.html" class="flex justify-between items-center group cursor-pointer gap-3">
                <div class="flex items-center gap-3 min-w-0">
                    <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center text-primary shrink-0">
                        <span class="material-symbols-outlined text-[20px]">add_circle</span>
                    </div>
                    <div class="min-w-0">
                        <h3 class="font-display text-base font-bold text-on-surface">添加摄像头</h3>
                        <p class="font-sans text-xs text-on-surface-variant font-medium mt-0.5 leading-relaxed">补充厨房或门口画面。</p>
                    </div>
                </div>
                <span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors shrink-0">chevron_right</span>
            </a>
        </section>
        
        <section class="bg-surface-container-lowest rounded-2xl shadow-soft p-5 border border-outline-variant/20">
            <a href="rules.html" class="flex justify-between items-center group cursor-pointer gap-3">
                <div class="flex items-center gap-3 min-w-0">
                    <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center text-primary shrink-0">
                        <span class="material-symbols-outlined text-[20px]">rule_settings</span>
                    </div>
                    <div class="min-w-0">
                        <h3 class="font-display text-base font-bold text-on-surface">守护规则</h3>
                    </div>
                </div>
                <span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors shrink-0">chevron_right</span>
            </a>
        </section>
    </main>

    <!-- 底部悬浮导航 -->
    <nav class="fixed bottom-0 left-0 w-full z-50 px-6 pb-8 pt-4 bg-white/90 backdrop-blur-xl border-t border-outline-variant/20 md:max-w-[480px] md:left-1/2 md:-translate-x-1/2 shadow-[0_-10px_40px_rgba(0,0,0,0.03)]">
        <div class="flex justify-between items-center">
            <a href="index.html" class="flex flex-col items-center gap-1.5 text-outline hover:text-primary transition-colors group">
                <div class="w-12 h-8 rounded-full flex items-center justify-center group-hover:bg-primary/5 transition-colors">
                    <span class="material-symbols-outlined text-[22px]">home</span>
                </div>
                <span class="font-sans text-[11px] font-semibold tracking-wide">首页</span>
            </a>
            <a href="monitor.html" class="flex flex-col items-center gap-1.5 text-primary">
                <div class="w-12 h-8 rounded-full bg-primary/15 flex items-center justify-center transition-colors">
                    <span class="material-symbols-outlined fill text-[22px]">nest_cam_indoor</span>
                </div>
                <span class="font-sans text-[11px] font-bold tracking-wide">守护</span>
            </a>
            <a href="events.html" class="flex flex-col items-center gap-1.5 text-outline hover:text-primary transition-colors group">
                <div class="w-12 h-8 rounded-full flex items-center justify-center group-hover:bg-primary/5 transition-colors">
                    <span class="material-symbols-outlined text-[22px]">history</span>
                </div>
                <span class="font-sans text-[11px] font-semibold tracking-wide">事件</span>
            </a>
            <a href="companionship.html" class="flex flex-col items-center gap-1.5 text-outline hover:text-primary transition-colors group">
                <div class="w-12 h-8 rounded-full flex items-center justify-center group-hover:bg-primary/5 transition-colors">
                    <span class="material-symbols-outlined text-[22px]">diversity_1</span>
                </div>
                <span class="font-sans text-[11px] font-semibold tracking-wide">陪伴</span>
            </a>
            <a href="privacy.html" class="flex flex-col items-center gap-1.5 text-outline hover:text-primary transition-colors group">
                <div class="w-12 h-8 rounded-full flex items-center justify-center group-hover:bg-primary/5 transition-colors">
                    <span class="material-symbols-outlined text-[22px]">person</span>
                </div>
                <span class="font-sans text-[11px] font-semibold tracking-wide">我的</span>
            </a>
        </div>
    </nav>
</body>
</html>
